<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juz</title>

<link rel="stylesheet" href="../style.css">

<style>
/* ===== POPUP AYAT ===== */
.ayat-popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  justify-content:center;
  align-items:flex-end;
  z-index:999;
}
.ayat-popup.hidden{display:none}

.popup-sheet{
  width:100%;
  max-width:480px;
  background:#111;
  color:#fff;
  border-radius:16px 16px 0 0;
  padding:16px;
  animation:slideUp .25s ease;
}
.popup-handle{
  width:40px;height:4px;
  background:#555;border-radius:2px;
  margin:0 auto 10px;
}
.popup-title{
  text-align:center;
  font-size:14px;
  opacity:.8;
  margin-bottom:12px;
}
.popup-btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#1a56db;
  color:#fff;
  font-size:15px;
}
.popup-close{
  background:transparent;
  color:#aaa;
  border:none;
  width:100%;
  padding:10px;
}

/* highlight ayat aktif */
.ayat-item.playing{
  background:rgba(26,86,219,.12);
  border-left:4px solid #1a56db;
}

@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}
</style>
</head>

<body class="page-juz">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

 <div class="header-title">
  <div id="judul-juz">Juz</div>
  <div id="judul-surah" class="judul-surah"></div>
</div>
 <div class="header-actions">
    <button class="nav-btn mushaf-btn" id="openMushaf">📖</button>
    <button class="nav-btn translate-btn" id="toggleTerjemah">🌐</button>
 </div>
</header>

<main class="container" id="juzContent">
  <p>Memuat juz...</p>
</main>

<audio id="audioPlayer"></audio>

<!-- ===== POPUP ===== -->
<div id="ayatPopup" class="ayat-popup hidden">
  <div class="popup-sheet">
    <div class="popup-handle"></div>
    <div class="popup-title" id="popupTitle">QS - : -</div>
    <button id="popupPlay" class="popup-btn">▶ Putar Murattal</button>
    <button id="popupBookmark" class="popup-btn">⭐ Bookmark Ayat</button>
    <button id="popupClose" class="popup-close">Tutup</button>
  </div>
</div>

<script src="../data/juz-map.js"></script>
<script>
const judulJuz = document.getElementById('judul-juz');
const judulSurah = document.getElementById('judul-surah');
const juzContent = document.getElementById('juzContent');
const audioPlayer = document.getElementById('audioPlayer');
const toggleBtn = document.getElementById('toggleTerjemah');

const popup = document.getElementById('ayatPopup');
const popupTitle = document.getElementById('popupTitle');
const popupPlay = document.getElementById('popupPlay');
const popupBookmark = document.getElementById('popupBookmark');
const popupClose = document.getElementById('popupClose');

const juzParam = new URLSearchParams(location.search).get('no');
const juzNo = Number(juzParam);

let selectedAyat = null;
let currentPlaying = null;

/* =========================
   OPEN MUSHAF MODE
========================= */
const mushafBtn = document.getElementById('openMushaf');
if (mushafBtn) {
  mushafBtn.addEventListener('click', () => {
    location.href = `mushaf.html?no=${juzNo}`;
  });
}

/* =========================
   VALIDASI JUZ
========================= */
if (!juzParam || isNaN(juzNo) || juzNo < 1 || juzNo > 30) {
  juzContent.innerHTML = '<p>Juz tidak ditemukan.</p>';
  throw new Error('Invalid Juz Number');
}

judulJuz.textContent = `Juz ${juzNo}`;

const juzInfo = JUZ_MAP.find(j => j.juz === juzNo);
if (!juzInfo) {
  juzContent.innerHTML = '<p>Juz tidak valid</p>';
  throw new Error('Juz tidak valid');
}

/* =========================
   BOOKMARK (ASLI)
========================= */
function getBookmarks() {
  return JSON.parse(localStorage.getItem('bookmarks')) || [];
}
function isBookmarked(juz, surah, ayat) {
  return getBookmarks().some(b =>
    b.mode === 'juz' &&
    b.juz == juz &&
    b.surah == surah &&
    b.ayat == ayat
  );
}

/* =========================
   TAJWID (ASLI)
========================= */
function tajwidColor(text) {
  return text
    .replace(/([اوي])/g, '<span class="tajwid-mad">$1</span>')
    .replace(/([نم]ْ)/g, '<span class="tajwid-idgham">$1</span>')
    .replace(/([قطبجد])/g, '<span class="tajwid-qalqalah">$1</span>');
}
function toArabicNumber(num) {
  const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(num).replace(/\d/g, d => arabicDigits[d]);
}

/* =========================
   OBSERVER JUDUL SURAH (ASLI)
========================= */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      judulSurah.textContent = entry.target.dataset.surahName;
    }
  });
}, {
  rootMargin: '-45% 0px -45% 0px'
});

/* =========================
   LOAD JUZ (LOGIKA UTUH)
========================= */
async function loadJuz({ start, end }) {
  juzContent.innerHTML = '';
  let firstSurahSet = false;

  for (let surah = start[0]; surah <= end[0]; surah++) {
    const res = await fetch(
      `https://api.alquran.cloud/v1/surah/${surah}/editions/ar.alafasy,id.indonesian`
    );
    const json = await res.json();

    const arab = json.data[0];
    const indo = json.data[1];

    const header = document.createElement('div');
    header.className = 'surah-header';
    header.dataset.surahName = `${arab.englishName} (${arab.name})`;
    header.innerHTML = `
      <div class="surah-title-deco">
        <span class="deco">❁</span>
        <span class="surah-title-text">
          ${arab.englishName} (${arab.name})
        </span>
        <span class="deco">❁</span>
      </div>
    `;
    juzContent.appendChild(header);
    observer.observe(header);

    if (!firstSurahSet) {
      judulSurah.textContent = header.dataset.surahName;
      firstSurahSet = true;
    }

    arab.ayahs.forEach(a => {
      const ayatNo = a.numberInSurah;

      if (
        (surah === start[0] && ayatNo < start[1]) ||
        (surah === end[0] && ayatNo > end[1])
      ) return;

      let arabText = a.text;

      /* ===== BISMAILLAH MANUAL (ASLI, TIDAK DIUBAH) ===== */
      if (
        ayatNo === 1 &&
        arab.number !== 1 &&
        arab.number !== 9
      ) {
        const bismillah = document.createElement('div');
        bismillah.className = 'bismillah-manual';
        bismillah.innerHTML = 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ';
        juzContent.appendChild(bismillah);

        arabText = arabText.replace(
          /^بِسْمِ\s*ٱ?للَّهِ\s*ٱ?لرَّحْمَٰنِ\s*ٱ?لرَّحِيمِ\s*/u,
          ''
        ).trim();
      }

      const terjemah = indo.ayahs.find(x => x.numberInSurah === ayatNo);
      const div = document.createElement('div');
      div.className = 'ayat-item';

      if (isBookmarked(juzNo, surah, ayatNo)) div.classList.add('bookmarked');

      div.dataset.juz = juzNo;
      div.dataset.surah = surah;
      div.dataset.ayat = ayatNo;
      div.dataset.audio = a.audio;

      div.innerHTML = `
        <div class="ayat-content">
          <div class="ayat-arab">
            ${tajwidColor(arabText)}
            <span class="ayat-nomor-inline">﴿${toArabicNumber(ayatNo)}﴾</span>
          </div>
          <div class="ayat-indo">
            ${terjemah?.text || ''}
          </div>
        </div>
      `;

      juzContent.appendChild(div);
    });
  }
}

loadJuz(juzInfo);

/* =========================
   TOGGLE TERJEMAH (ASLI)
========================= */
let showTerjemah = true;
toggleBtn.addEventListener('click', () => {
  showTerjemah = !showTerjemah;
  document.body.classList.toggle('hide-translation', !showTerjemah);
});

/* =========================
   KLIK AYAT → POPUP
========================= */
document.addEventListener('click', e => {
  const ayat = e.target.closest('.ayat-item');
  if (!ayat) return;

  selectedAyat = ayat;
  popupTitle.textContent =
    `QS ${ayat.dataset.surah} : ${ayat.dataset.ayat}`;
  popup.classList.remove('hidden');
});

/* =========================
   POPUP ACTIONS
========================= */
popupPlay.onclick = () => {
  if (!selectedAyat) return;

  if (currentPlaying) currentPlaying.classList.remove('playing');

  currentPlaying = selectedAyat;
  currentPlaying.classList.add('playing');

  audioPlayer.src = currentPlaying.dataset.audio;
  audioPlayer.play();

  popup.classList.add('hidden');
};

popupBookmark.onclick = () => {
  const ayatEl = selectedAyat;
  const surah = ayatEl.dataset.surah;
  const ayat  = ayatEl.dataset.ayat;

  let bookmarks = getBookmarks();
  const idx = bookmarks.findIndex(b =>
    b.mode === 'juz' &&
    b.juz == juzNo &&
    b.surah == surah &&
    b.ayat == ayat
  );

  if (idx >= 0) {
    bookmarks.splice(idx, 1);
    ayatEl.classList.remove('bookmarked');
  } else {
    bookmarks.push({
      mode: 'juz',
      juz: juzNo,
      surah,
      ayat,
      text: ayatEl.querySelector('.ayat-arab').innerText
    });
    ayatEl.classList.add('bookmarked');
  }

  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
  popup.classList.add('hidden');
};

popupClose.onclick = () => popup.classList.add('hidden');

/* =========================
   AUTO NEXT + SCROLL
========================= */
audioPlayer.addEventListener('ended', () => {
  if (!currentPlaying) return;

  let next = currentPlaying.nextElementSibling;
  while (next && !next.classList.contains('ayat-item')) {
    next = next.nextElementSibling;
  }

  if (next) {
    currentPlaying.classList.remove('playing');
    currentPlaying = next;
    currentPlaying.classList.add('playing');

    audioPlayer.src = currentPlaying.dataset.audio;
    audioPlayer.play();

    currentPlaying.scrollIntoView({
      behavior: 'smooth',
      block: 'center'
    });
  } else {
    currentPlaying.classList.remove('playing');
    currentPlaying = null;
  }
});
</script>

</body>
</html>
