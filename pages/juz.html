<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juz</title>

<link rel="stylesheet" href="../style.css">
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
/* ================= AYAT ================= */

.surah-header{
  background:linear-gradient(145deg,#0a4d3a,#0f6e52);
  color:#fff;
  padding:18px;
  border-radius:20px;
  margin-bottom:16px;
  text-align:center;
  box-shadow:0 8px 28px rgba(10,77,58,.18);
}

.surah-title-deco{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.surah-title-text{
  font-size:18px;
  font-weight:700;
}

.deco{
  color:var(--accent);
}

.bismillah-manual{
  background:#fff;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  text-align:center;
  font-family:'Amiri',serif;
  font-size:28px;
  line-height:2;
  color:var(--primary);
  box-shadow:var(--shadow-sm);
}

.ayat-item{
  background:#fff;
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  transition:.25s;
}

.ayat-item:active{
  transform:scale(.985);
}

.ayat-item.bookmarked{
  border-left:4px solid var(--accent);
  background:rgba(196,154,42,.08);
}

.ayat-item.playing{
  border-left:4px solid var(--primary);
  background:var(--primary-ghost-strong);
}

.ayat-content{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.ayat-arab{
  font-family:'Amiri',serif;
  direction:rtl;
  text-align:right;
  font-size:29px;
  line-height:2.1;
}

.ayat-nomor-inline{
  color:var(--primary);
  font-size:22px;
  margin-right:6px;
}

.ayat-indo{
  font-size:14px;
  line-height:1.8;
  color:var(--text-secondary);
}

.hide-translation .ayat-indo{
  display:none;
}

/* ===== HEADER ===== */

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:#fff;
  color:var(--primary);
  box-shadow:var(--shadow-sm);
}

.header-actions{
  display:flex;
  gap:8px;
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#judul-juz{
  font-size:17px;
  font-weight:800;
  color:var(--primary);
}

.judul-surah{
  font-size:12px;
  color:#777;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

/* ===== POPUP ===== */

.ayat-popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.42);
  display:flex;
  align-items:flex-end;
  justify-content:center;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
  z-index:9999;
}
  .app-header{
  z-index:100;
}
.popup-sheet{
  position:relative;
  z-index:10000;
}

.ayat-popup.hidden{
  display:none;
}

.popup-sheet{
  width:100%;
  max-width:480px;
  background:#fff;
  border-radius:24px 24px 0 0;
  padding:18px;
  animation:slideUp .25s;
}

.popup-handle{
  width:44px;
  height:4px;
  background:#ddd;
  margin:auto;
  border-radius:20px;
  margin-bottom:14px;
}

.popup-title{
  text-align:center;
  margin-bottom:16px;
  color:#666;
  font-weight:700;
}

.popup-btn{
  width:100%;
  padding:13px;
  margin-bottom:10px;
  border:none;
  border-radius:14px;
  background:var(--primary);
  color:#fff;
  font-weight:700;
}

#popupBookmark{
  background:var(--accent);
}

.popup-close{
  width:100%;
  padding:12px;
  border:none;
  background:none;
  color:#888;
}

@keyframes slideUp{
  from{
    transform:translateY(100%);
  }
  to{
    transform:translateY(0);
  }
}
</style>
</head>

<body class="page-juz">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

 <div class="header-title">
  <div id="judul-juz">Juz</div>
  <div id="judul-surah" class="judul-surah"></div>
</div>
 <div class="header-actions">
    <button class="nav-btn mushaf-btn" id="openMushaf">📖</button>
    <button class="nav-btn translate-btn" id="toggleTerjemah">🌐</button>
 </div>
</header>

<main class="container" id="juzContent">
  <p>Memuat juz...</p>
</main>

<audio id="audioPlayer"></audio>

<!-- ===== POPUP ===== -->
<div id="ayatPopup" class="ayat-popup hidden">
  <div class="popup-sheet">
    <div class="popup-handle"></div>
    <div class="popup-title" id="popupTitle">QS - : -</div>
    <button id="popupPlay" class="popup-btn">▶ Putar Murattal</button>
    <button id="popupBookmark" class="popup-btn">⭐ Bookmark Ayat</button>
    <button id="popupClose" class="popup-close">Tutup</button>
  </div>
</div>
  
<script src="../data/surah-names.js"></script>
<script src="../data/juz-map.js"></script>
  
<script>
const judulJuz = document.getElementById('judul-juz');
const judulSurah = document.getElementById('judul-surah');
const juzContent = document.getElementById('juzContent');
const audioPlayer = document.getElementById('audioPlayer');
const toggleBtn = document.getElementById('toggleTerjemah');

const popup = document.getElementById('ayatPopup');
const popupTitle = document.getElementById('popupTitle');
const popupPlay = document.getElementById('popupPlay');
const popupBookmark = document.getElementById('popupBookmark');
const popupClose = document.getElementById('popupClose');

const juzParam = new URLSearchParams(location.search).get('no');
const juzNo = Number(juzParam);

let selectedAyat = null;
let currentPlaying = null;

/* =========================
   OPEN MUSHAF MODE
========================= */
const mushafBtn = document.getElementById('openMushaf');
if (mushafBtn) {
  mushafBtn.addEventListener('click', () => {
    location.href = `mushaf.html?no=${juzNo}`;
  });
}

/* =========================
   VALIDASI JUZ
========================= */
if (!juzParam || isNaN(juzNo) || juzNo < 1 || juzNo > 30) {
  juzContent.innerHTML = '<p>Juz tidak ditemukan.</p>';
  throw new Error('Invalid Juz Number');
}

judulJuz.textContent = `Juz ${juzNo}`;

const juzInfo = JUZ_MAP.find(j => j.juz === juzNo);
if (!juzInfo) {
  juzContent.innerHTML = '<p>Juz tidak valid</p>';
  throw new Error('Juz tidak valid');
}

/* =========================
   BOOKMARK (ASLI)
========================= */
function getBookmarks() {
  return JSON.parse(localStorage.getItem('bookmarks')) || [];
}
function isBookmarked(juz, surah, ayat) {
  return getBookmarks().some(b =>
    b.mode === 'juz' &&
    b.juz == juz &&
    b.surah == surah &&
    b.ayat == ayat
  );
}

/* =========================
   TAJWID (ASLI)
========================= */
function tajwidColor(text) {
  return text
    .replace(/([اوي])/g, '<span class="tajwid-mad">$1</span>')
    .replace(/([نم]ْ)/g, '<span class="tajwid-idgham">$1</span>')
    .replace(/([قطبجد])/g, '<span class="tajwid-qalqalah">$1</span>');
}
function toArabicNumber(num) {
  const arabicDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(num).replace(/\d/g, d => arabicDigits[d]);
}

function removeBismillah(text) {
  if (!text.includes('بِسْمِ') && !text.includes('بسم')) {
    return text.trim();
  }

  const rahimWords = ['الرَّحِيمِ', 'ٱلرَّحِيمِ'];

  for (const word of rahimWords) {
    const idx = text.indexOf(word);
    if (idx !== -1) {
      return text.slice(idx + word.length).trim();
    }
  }

  return text.trim();
}

/* =========================
   OBSERVER JUDUL SURAH (ASLI)
========================= */
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      judulSurah.textContent = entry.target.dataset.surahName;
    }
  });
}, {
  rootMargin: '-45% 0px -45% 0px'
});

/* =========================
   LOAD JUZ (LOGIKA UTUH)
========================= */
async function loadJuz({ start, end }) {
  juzContent.innerHTML = '';
  let firstSurahSet = false;

  for (let surah = start[0]; surah <= end[0]; surah++) {
    const res = await fetch(
      `https://api.alquran.cloud/v1/surah/${surah}/editions/ar.alafasy,id.indonesian`
    );
    const json = await res.json();

    const arab = json.data[0];
    const indo = json.data[1];

    const header = document.createElement('div');
    header.className = 'surah-header';
   header.dataset.surahName = `${SURAH_NAMES[surah]} (${arab.name})`;
    header.innerHTML = `
      <div class="surah-title-deco">
        <span class="deco">❁</span>
        <span class="surah-title-text">
  ${SURAH_NAMES[surah]} (${arab.name})
</span>
        <span class="deco">❁</span>
      </div>
    `;
    juzContent.appendChild(header);
    observer.observe(header);

    if (!firstSurahSet) {
      judulSurah.textContent = header.dataset.surahName;
      firstSurahSet = true;
    }

    arab.ayahs.forEach(a => {
      const ayatNo = a.numberInSurah;

      if (
        (surah === start[0] && ayatNo < start[1]) ||
        (surah === end[0] && ayatNo > end[1])
      ) return;

      let arabText = a.text;

      /* ===== BISMAILLAH MANUAL (ASLI, TIDAK DIUBAH) ===== */
      if (
        ayatNo === 1 &&
        arab.number !== 1 &&
        arab.number !== 9
      ) {
        const bismillah = document.createElement('div');
        bismillah.className = 'bismillah-manual';
        bismillah.innerHTML = 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ';
        juzContent.appendChild(bismillah);

        arabText = removeBismillah(arabText);
      }

      const terjemah = indo.ayahs.find(x => x.numberInSurah === ayatNo);
      const div = document.createElement('div');
     div.className = 'ayat-item';
div.id = `ayat-${surah}-${ayatNo}`;

      if (isBookmarked(juzNo, surah, ayatNo)) div.classList.add('bookmarked');

      div.dataset.juz = juzNo;
      div.dataset.surah = surah;
      div.dataset.ayat = ayatNo;
      div.dataset.audio = a.audio;

      div.innerHTML = `
        <div class="ayat-content">
          <div class="ayat-arab">
            ${tajwidColor(arabText)}
            <span class="ayat-nomor-inline">﴿${toArabicNumber(ayatNo)}﴾</span>
          </div>
          <div class="ayat-indo">
            ${terjemah?.text || ''}
          </div>
        </div>
      `;

      juzContent.appendChild(div);
    });
  }
}

loadJuz(juzInfo).then(() => {
  const targetAyat = localStorage.getItem('scrollToAyat');

  if (targetAyat) {
    setTimeout(() => {
      const target = document.getElementById(`ayat-${targetAyat}`);

      if (target) {
        target.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });

        target.classList.add('playing');

        setTimeout(() => {
          target.classList.remove('playing');
        }, 1800);
      }

      localStorage.removeItem('scrollToAyat');
    }, 400);
  }
});
/* =========================
   TOGGLE TERJEMAH (ASLI)
========================= */
let showTerjemah = true;
toggleBtn.addEventListener('click', () => {
  showTerjemah = !showTerjemah;
  document.body.classList.toggle('hide-translation', !showTerjemah);
});

/* =========================
   KLIK AYAT → POPUP
========================= */
document.addEventListener('click', e => {
  const ayat = e.target.closest('.ayat-item');
  if (!ayat) return;

  selectedAyat = ayat;
  popupTitle.textContent =
    `QS ${ayat.dataset.surah} : ${ayat.dataset.ayat}`;
  popup.classList.remove('hidden');
});

/* =========================
   POPUP ACTIONS
========================= */
popupPlay.onclick = () => {
  if (!selectedAyat) return;

  if (currentPlaying) currentPlaying.classList.remove('playing');

  currentPlaying = selectedAyat;
  currentPlaying.classList.add('playing');

  audioPlayer.src = currentPlaying.dataset.audio;
  audioPlayer.play();

  popup.classList.add('hidden');
};

popupBookmark.onclick = () => {
  const ayatEl = selectedAyat;
  const surah = ayatEl.dataset.surah;
  const ayat  = ayatEl.dataset.ayat;

  let bookmarks = getBookmarks();
  const idx = bookmarks.findIndex(b =>
    b.mode === 'juz' &&
    b.juz == juzNo &&
    b.surah == surah &&
    b.ayat == ayat
  );

  if (idx >= 0) {
    bookmarks.splice(idx, 1);
    ayatEl.classList.remove('bookmarked');
  } else {
    bookmarks.push({
      mode: 'juz',
      juz: juzNo,
      surah,
      ayat,
      text: ayatEl.querySelector('.ayat-arab').innerText
    });
    ayatEl.classList.add('bookmarked');
  }

  localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
  popup.classList.add('hidden');
};

popupClose.onclick = () => popup.classList.add('hidden');

/* =========================
   AUTO NEXT + SCROLL
========================= */
audioPlayer.addEventListener('ended', () => {
  if (!currentPlaying) return;

  let next = currentPlaying.nextElementSibling;
  while (next && !next.classList.contains('ayat-item')) {
    next = next.nextElementSibling;
  }

  if (next) {
    currentPlaying.classList.remove('playing');
    currentPlaying = next;
    currentPlaying.classList.add('playing');

    audioPlayer.src = currentPlaying.dataset.audio;
    audioPlayer.play();

    currentPlaying.scrollIntoView({
      behavior: 'smooth',
      block: 'center'
    });
  } else {
    currentPlaying.classList.remove('playing');
    currentPlaying = null;
  }
});
</script>

</body>
</html>
