<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arah Kiblat</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">

<style>
/* =========================
   KIBLAT STYLE
========================= */

.page-kiblat{
  background:var(--bg);
}

.kiblat-container{
  padding:18px 18px 110px;
  text-align:center;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

.header-title>div:first-child{
  font-size:17px;
  font-weight:800;
  color:var(--primary);
}

.judul-surah{
  font-size:12px;
  color:var(--text-secondary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.kiblat-card{
  background:var(--card);
  border-radius:24px;
  padding:24px 18px 20px;
  box-shadow:var(--shadow-md);
  border:1px solid rgba(255,255,255,.7);
  position:relative;
  overflow:hidden;
}

.kiblat-card::before{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  border-radius:50%;
  background:var(--primary-ghost);
  top:-80px;
  right:-70px;
}

.kompas-wrapper{
  position:relative;
  width:240px;
  height:240px;
  margin:18px auto 22px;
}

.kompas{
  width:100%;
  height:100%;
  border-radius:50%;
  position:relative;
  background:
    radial-gradient(circle at center, #fff 0 36%, transparent 37%),
    conic-gradient(
      from 0deg,
      rgba(10,77,58,.16),
      rgba(196,154,42,.18),
      rgba(10,77,58,.16)
    );
  border:10px solid #fff;
  box-shadow:
    inset 0 0 0 2px var(--primary-ghost-strong),
    0 10px 32px rgba(10,77,58,.16);
}

.kompas::before{
  content:"N";
  position:absolute;
  top:12px;
  left:50%;
  transform:translateX(-50%);
  font-size:14px;
  font-weight:800;
  color:var(--primary);
}

.kompas::after{
  content:"Kiblat";
  position:absolute;
  inset:50%;
  transform:translate(-50%,-50%);
  width:82px;
  height:82px;
  border-radius:50%;
  background:var(--card);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:13px;
  font-weight:800;
  color:var(--primary);
  box-shadow:var(--shadow-sm);
}

.panah{
  position:absolute;
  top:50%;
  left:50%;
  width:8px;
  height:94px;
  background:linear-gradient(var(--accent),var(--primary));
  transform-origin:bottom center;
  transform:translate(-50%,-100%) rotate(0deg);
  border-radius:999px;
  z-index:3;
  box-shadow:0 4px 12px rgba(10,77,58,.25);
}

.panah::after{
  content:"";
  position:absolute;
  top:-16px;
  left:50%;
  transform:translateX(-50%);
  width:0;
  height:0;
  border-left:13px solid transparent;
  border-right:13px solid transparent;
  border-bottom:18px solid var(--accent);
}

.info-kiblat{
  background:var(--primary-ghost);
  color:var(--primary);
  font-size:14px;
  font-weight:700;
  line-height:1.5;
  margin-top:8px;
  padding:12px 14px;
  border-radius:16px;
}

.btn-kiblat{
  width:100%;
  padding:14px;
  margin-top:18px;
  border-radius:16px;
  border:none;
  background:linear-gradient(145deg,var(--primary),var(--primary-hover));
  color:#fff;
  font-size:15px;
  font-weight:800;
  font-family:'Plus Jakarta Sans',sans-serif;
  box-shadow:0 8px 24px rgba(10,77,58,.22);
  cursor:pointer;
  transition:.25s ease;
}

.btn-kiblat:active{
  transform:scale(.98);
}
</style>
</head>

<body class="page-kiblat">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>Arah Kiblat</div>
    <div id="lokasi-aktif" class="judul-surah"></div>
  </div>
</header>

<main class="kiblat-container">
  <div class="kiblat-card">
    <div class="kompas-wrapper">
      <div class="kompas">
        <div class="panah" id="panahKiblat"></div>
      </div>
    </div>

    <div class="info-kiblat" id="infoArah">
      Menunggu izin lokasi & sensor...
    </div>

    <button class="btn-kiblat" onclick="initKiblat()">
      📍 Aktifkan Arah Kiblat
    </button>
  </div>
</main>

<nav class="bottom-nav">
  <a href="../index.html">Home</a>
  <a href="quran.html">Al-Qur'an</a>
  <a href="bookmark.html">Bookmark</a>
  <a href="about.html">Tentang</a>
</nav>

<script>
const panah = document.getElementById('panahKiblat');
const info = document.getElementById('infoArah');
const lokasiEl = document.getElementById('lokasi-aktif');

/* =========================
   HITUNG ARAH KIBLAT
========================= */
function hitungKiblat(lat, lon) {
  const kaabaLat = 21.4225 * Math.PI / 180;
  const kaabaLon = 39.8262 * Math.PI / 180;

  lat = lat * Math.PI / 180;
  lon = lon * Math.PI / 180;

  const y = Math.sin(kaabaLon - lon);
  const x = Math.cos(lat) * Math.tan(kaabaLat) -
            Math.sin(lat) * Math.cos(kaabaLon - lon);

  let brng = Math.atan2(y, x) * 180 / Math.PI;
  return (brng + 360) % 360;
}

/* =========================
   INIT KIBLAT
========================= */
function initKiblat() {
  if (!navigator.geolocation) {
    alert('Browser tidak mendukung GPS');
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    lokasiEl.textContent = `📍 Lokasi Anda`;
    const arahKiblat = hitungKiblat(lat, lon);

    if (window.DeviceOrientationEvent) {
      window.addEventListener('deviceorientation', e => {
        if (e.alpha === null) return;

        const heading = 360 - e.alpha;
        const rotate = arahKiblat - heading;

        panah.style.transform =
          `translate(-50%, -100%) rotate(${rotate}deg)`;

        info.textContent =
          `Arah Kiblat: ${Math.round(arahKiblat)}° dari Utara`;
      });
    } else {
      info.textContent =
        `Arah Kiblat: ${Math.round(arahKiblat)}° dari Utara`;
    }
  }, () => {
    alert('Izin lokasi ditolak');
  });
}
</script>

</body>
</html>
