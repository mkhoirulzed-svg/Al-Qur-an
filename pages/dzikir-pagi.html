<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dzikir Pagi</title>

<link rel="stylesheet" href="../style.css">
<!-- Menambahkan font Amiri dari Google Fonts untuk Arab yang lebih bagus -->
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">

<style>
/* =========================
   DZIKIR PAGI STYLE
========================= */
.page-dzikir {
  background: #f8fafc;
}

.dzikir-container {
  padding: 16px;
  max-width: 720px;
  margin: auto;
  padding-top: 70px; /* Space for header */
  padding-bottom: 80px; /* Space for bottom nav */
}

.dzikir-card {
  background: #fff;
  border-radius: 14px;
  padding: 20px 16px;
  margin-bottom: 20px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  transition: all 0.3s ease;
  /* Agar scroll tidak tertutup header */
  scroll-margin-top: 80px; 
}

.dzikir-card.completed {
  border-left: 5px solid #10b981;
  opacity: 0.7;
  background: #f0fdf4;
}

.dzikir-arab {
  direction: rtl;
  font-family: 'Amiri', serif;
  font-size: 1.85rem;
  line-height: 2.5;
  margin-bottom: 6px;
  text-align: right;
}

.dzikir-arti {
  font-size: 0.85rem;
  opacity: 0.75;
  margin-bottom: 10px;
  line-height: 1.6;
}

.dzikir-latin {
  font-size: .95rem;
  color: #475569;
  font-style: italic;
  line-height: 1.7;
  margin-bottom: 10px;
}

.dzikir-title {
  font-weight: 700;
  color: #0f172a;
  margin-bottom: 12px;
  font-size: 1.1rem;
}

.dzikir-count {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: #f1f5f9;
  color: #334155;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: .85rem;
  font-weight: 600;
  margin-bottom: 16px;
}

.dzikir-count .current-count {
  color: #0284c7;
  font-size: 1rem;
}

.action-buttons {
  display: flex;
  gap: 10px;
}

.btn-read {
  flex: 1;
  padding: 12px;
  background: #0284c7;
  color: #fff;
  border: none;
  border-radius: 10px;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-read:active {
  background: #0369a1;
}

.btn-read:disabled {
  background: #94a3b8;
  cursor: not-allowed;
}

.btn-skip {
  padding: 12px 20px;
  background: #f1f5f9;
  color: #64748b;
  border: none;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

.btn-skip:active {
  background: #e2e8f0;
}

.app-header {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: rgba(248, 250, 252, 0.9);
  backdrop-filter: blur(10px);
  z-index: 100;
  display: flex;
  align-items: center;
  padding: 12px 16px;
  border-bottom: 1px solid #e2e8f0;
}

.header-title div:first-child {
  font-weight: 700;
  font-size: 1.1rem;
}

.judul-surah {
  font-size: 0.8rem;
  color: #64748b;
}

.nav-btn {
  background: none;
  border: none;
  margin-right: 12px;
  color: #0f172a;
}

.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: #fff;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  border-top: 1px solid #e2e8f0;
  z-index: 100;
}

.bottom-nav a {
  text-decoration: none;
  color: #64748b;
  font-size: 0.85rem;
  font-weight: 600;
}

</style>
</head>

<body class="page-dzikir">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>Dzikir Pagi</div>
    <div class="judul-surah">Dzikir pagi sesuai sunnah</div>
  </div>
</header>

<main class="dzikir-container" id="dzikirList">
</main>
   
<nav class="bottom-nav">
  <a href="../index.html">Home</a>
  <a href="quran.html">Al-Qur'an</a>
  <a href="bookmark.html">Bookmark</a>
  <a href="about.html">Tentang</a>
</nav>

<script>
const today = new Date().toISOString().slice(0,10);
const STORAGE_KEY = "dzikirPagiRumaysho";

const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
const todayData = saved[today] || {};

fetch("../data/dzikirpagi.json")
.then(res => res.json())
.then(data => {

    const list = document.getElementById("dzikirList");

    data.forEach((item, index) => {
        // Jika jumlah kosong, default menjadi 1 kali baca
        const targetJumlah = parseInt(item.jumlah) || 1;
        const currentCount = todayData[item.id] || 0;
        const isCompleted = currentCount >= targetJumlah;
        const completedClass = isCompleted ? "completed" : "";

        list.insertAdjacentHTML("beforeend", `
            <div class="dzikir-card ${completedClass}" data-key="${item.id}" id="card-${item.id}">

                ${item.judul ? `
                <div class="dzikir-title">
                    ${item.judul}
                </div>
                ` : ""}

                <div class="dzikir-arab">
                    ${item.arab}
                </div>

                ${item.latin ? `
                <div class="dzikir-latin">
                    ${item.latin}
                </div>
                ` : ""}

                <div class="dzikir-arti">
                    ${item.arti}
                </div>

                <div class="dzikir-count">
                    Dibaca <span class="current-count" id="count-${item.id}">${currentCount}</span> / ${targetJumlah}
                </div>

                <div class="action-buttons">
                    <button class="btn-read" id="btn-read-${item.id}" ${isCompleted ? 'disabled' : ''}>
                        ${isCompleted ? '✓ Selesai' : 'Baca 1x'}
                    </button>
                    ${index < data.length - 1 ? `
                    <button class="btn-skip" id="btn-skip-${item.id}">
                        Skip ➜
                    </button>
                    ` : ''}
                </div>

            </div>
        `);
    });

    // Event Listener untuk tombol
    data.forEach((item, index) => {
        const targetJumlah = parseInt(item.jumlah) || 1;
        const card = document.getElementById(`card-${item.id}`);
        const btnRead = document.getElementById(`btn-read-${item.id}`);
        const btnSkip = document.getElementById(`btn-skip-${item.id}`);
        const countSpan = document.getElementById(`count-${item.id}`);

        // Fungsi Scroll ke kartu berikutnya
        const scrollToNext = () => {
            const nextCard = card.nextElementSibling;
            if (nextCard && nextCard.classList.contains('dzikir-card')) {
                nextCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        // Event Tombol Baca
        if(btnRead) {
            btnRead.addEventListener("click", () => {
                let count = todayData[item.id] || 0;
                
                if(count < targetJumlah) {
                    count++;
                    todayData[item.id] = count;
                    saved[today] = todayData;
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));

                    // Update UI Counter
                    countSpan.innerText = count;

                    // Cek jika sudah mencapai target
                    if(count >= targetJumlah) {
                        card.classList.add('completed');
                        btnRead.innerText = '✓ Selesai';
                        btnRead.disabled = true;
                        
                        // Auto scroll ke dzikir berikutnya dengan delay sebentar
                        setTimeout(() => {
                            scrollToNext();
                        }, 400);
                    } else {
                        // Jika belum selesai, scroll ke atas dzikir yang sedang dibaca
                        card.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        }

        // Event Tombol Skip
        if(btnSkip) {
            btnSkip.addEventListener("click", () => {
                scrollToNext();
            });
        }
    });
})
.catch(err => {
    document.getElementById("dzikirList").innerHTML = `
        <div class="dzikir-card">
            <b>Gagal memuat dzikir.</b><br><br>
            ${err}
        </div>
    `;
});
</script>

</body>
</html>
