<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dzikir Pagi</title>

<link rel="stylesheet" href="../style.css">

<style>
/* =========================
   DZIKIR PAGI STYLE
========================= */
.page-dzikir {
  background: #f8fafc;
}

.dzikir-container {
  padding: 16px;
  max-width: 720px;
  margin: auto;
}

.dzikir-card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.dzikir-arab {
  direction: rtl;
  font-family: 'Amiri', serif;
  font-size: 1.85rem;
  line-height: 2.5;
  margin-bottom: 6px;
}

.dzikir-arti {
  font-size: 0.85rem;
  opacity: 0.75;
  margin-bottom: 10px;
}

.amal-action {
  display: flex;
  align-items: center;
  gap: 8px;
}

input[type="checkbox"] {
  transform: scale(1.2);
  accent-color: #0284c7;
}

   .dzikir-latin{
  font-size:.95rem;
  color:#475569;
  font-style:italic;
  line-height:1.7;
  margin-bottom:10px;
}

.dzikir-title{
  font-weight:700;
  color:#0f172a;
  margin-bottom:12px;
}

.dzikir-count{
  display:inline-block;
  background:#0284c7;
  color:#fff;
  padding:4px 10px;
  border-radius:999px;
  font-size:.75rem;
  margin-top:8px;
}
</style>
</head>

<body class="page-dzikir">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>Dzikir Pagi</div>
    <div class="judul-surah">Dzikir pagi sesuai sunnah</div>
  </div>
</header>

<main class="dzikir-container" id="dzikirList">
</main>
   
<nav class="bottom-nav">
  <a href="../index.html">Home</a>
  <a href="quran.html">Al-Qur'an</a>
  <a href="bookmark.html">Bookmark</a>
  <a href="about.html">Tentang</a>
</nav>

<script>
const today = new Date().toISOString().slice(0,10);
const STORAGE_KEY = "dzikirPagiRumaysho";

const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
const todayData = saved[today] || {};

fetch("../data/dzikirpagi.json")
.then(res => res.json())
.then(data => {

    const list = document.getElementById("dzikirList");

    data.forEach(item => {

        const checked = todayData[item.id] ? "checked" : "";

        list.insertAdjacentHTML("beforeend", `
            <div class="dzikir-card" data-key="${item.id}">

                ${item.judul ? `
                <div class="dzikir-title">
                    ${item.judul}
                </div>
                ` : ""}

                <div class="dzikir-arab">
                    ${item.arab}
                </div>

                ${item.latin ? `
                <div class="dzikir-latin">
                    ${item.latin}
                </div>
                ` : ""}

                <div class="dzikir-arti">
                    ${item.arti}
                </div>

                ${item.jumlah ? `
                <div class="dzikir-count">
                    Dibaca ${item.jumlah}
                </div>
                ` : ""}

                <div class="amal-action">
                    <input type="checkbox" ${checked}>
                    <label>Sudah dibaca</label>
                </div>

            </div>
        `);

    });

    document.querySelectorAll(".dzikir-card").forEach(card=>{

        const key = card.dataset.key;
        const checkbox = card.querySelector("input");

        checkbox.addEventListener("change",()=>{

            todayData[key]=checkbox.checked;
            saved[today]=todayData;

            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify(saved)
            );

        });

    });

})
.catch(err=>{
    document.getElementById("dzikirList").innerHTML=`
        <div class="dzikir-card">
            <b>Gagal memuat dzikir.</b><br><br>
            ${err}
        </div>
    `;
});
</script>

</body>
</html>
