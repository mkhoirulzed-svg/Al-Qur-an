<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Daily Amal</title>

<link rel="stylesheet" href="../style.css">

<style>
/* =========================
   DAILY AMAL STYLE
========================= */
.page-daily {
  background: #f8fafc;
}

.daily-container {
  padding: 16px;
}

.daily-card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.daily-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.daily-date {
  font-size: 0.85rem;
  opacity: 0.7;
  margin-bottom: 12px;
}

.amal-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #e5e7eb;
}

.amal-item:last-child {
  border-bottom: none;
}

.amal-item label {
  flex: 1;
  font-size: 0.95rem;
}

input[type="checkbox"] {
  transform: scale(1.2);
  accent-color: #0284c7;
}
</style>
</head>

<body class="page-daily">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>My Daily Amal</div>
    <div class="judul-surah">Evaluasi ibadah harian</div>
  </div>
</header>

<main class="daily-container">

  <div class="daily-card" id="amalContainer">
    <div class="daily-title">📋 Checklist Amal</div>
    <div class="daily-date" id="todayDate"></div>

    <!-- AMAL AKAN DIRENDER DI SINI -->

    <hr style="margin:16px 0; opacity:.3">

    <div class="daily-title">➕ Tambah Amal Custom</div>

    <div style="display:flex; gap:8px; margin-top:10px;">
      <input
        type="text"
        id="customAmalInput"
        placeholder="Contoh: Membantu orang tua"
        style="
          flex:1;
          padding:10px;
          border-radius:10px;
          border:1px solid #e5e7eb;
          font-size:.9rem;
        "
      >
      <button
        id="addCustomAmal"
        style="
          padding:10px 14px;
          border-radius:10px;
          border:none;
          background:#0284c7;
          color:#fff;
          font-weight:600;
        "
      >
        Tambah
      </button>
    </div>

  </div>

</main>

<nav class="bottom-nav">
  <a href="../index.html">Home</a>
  <a href="quran.html">Al-Qur'an</a>
  <a href="bookmark.html">Bookmark</a>
  <a href="about.html">Tentang</a>
</nav>

<script>
/* =========================
   DAILY AMAL SCRIPT
========================= */

const today = new Date().toISOString().slice(0, 10);
document.getElementById('todayDate').textContent = `Tanggal: ${today}`;

/* ---------- STORAGE ---------- */
function getDailyData() {
  const all = JSON.parse(localStorage.getItem('dailyAmal')) || {};
  return all[today] || {};
}

function saveDailyData(data) {
  const all = JSON.parse(localStorage.getItem('dailyAmal')) || {};
  all[today] = data;
  localStorage.setItem('dailyAmal', JSON.stringify(all));
}

function getAmalConfig() {
  return JSON.parse(localStorage.getItem('amalConfig')) || {};
}

function getCustomAmal() {
  return JSON.parse(localStorage.getItem('customAmal')) || [];
}

function saveCustomAmal(list) {
  localStorage.setItem('customAmal', JSON.stringify(list));
}

/* ---------- INIT ---------- */
const dailyData = getDailyData();
const amalConfig = getAmalConfig();
const customAmal = getCustomAmal();
const container = document.getElementById('amalContainer');

/* ---------- LABEL MAP ---------- */
const labelMap = {
  sholat5: 'Sholat 5 Waktu',
  jamaah: 'Sholat Berjamaah',
  sunnah: 'Sholat Sunnah',
  tilawah: 'Tilawah Al-Qur’an',
  dzikir: 'Dzikir',
  sedekah: 'Sedekah',
  kajian: 'Mengikuti Kajian',
  istighfar: 'Istighfar'
};

/* ---------- RENDER ---------- */
function renderAmal() {
  container.querySelectorAll('.amal-item').forEach(e => e.remove());

  Object.keys(amalConfig).forEach(key => {
    if (amalConfig[key]) {
      addCheckbox(key, labelMap[key] || key);
    }
  });

  customAmal.forEach(item => {
    addCheckbox(item.key, item.label);
  });
}

/* ---------- ADD CHECKBOX ---------- */
function addCheckbox(key, label) {
  const div = document.createElement('div');
  div.className = 'amal-item';

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.checked = !!dailyData[key];

  cb.addEventListener('change', () => {
    dailyData[key] = cb.checked;
    saveDailyData(dailyData);
  });

  const lbl = document.createElement('label');
  lbl.textContent = label;

  div.appendChild(cb);
  div.appendChild(lbl);

  container.insertBefore(div, container.querySelector('hr'));
}

/* ---------- ADD CUSTOM ---------- */
document.getElementById('addCustomAmal').addEventListener('click', () => {
  const input = document.getElementById('customAmalInput');
  const value = input.value.trim();

  if (!value) return;

  const key = 'custom_' + Date.now();
  customAmal.push({ key, label: value });
  saveCustomAmal(customAmal);

  input.value = '';
  renderAmal();
});

/* ---------- START ---------- */
renderAmal();
</script>

</body>
</html>
