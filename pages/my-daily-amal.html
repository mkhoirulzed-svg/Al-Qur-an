<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Daily Amal</title>

<link rel="stylesheet" href="../style.css">

<style>
.page-daily {
  background: #f8fafc;
}

.daily-container {
  padding: 86px 16px 110px;
  max-width: 720px;
  margin: auto;
}

.daily-card,
.progress-card {
  background: #fff;
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 14px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.daily-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

.daily-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.daily-date {
  font-size: 0.85rem;
  opacity: 0.7;
  margin-bottom: 12px;
}

.setting-btn {
  font-size: 0.8rem;
  padding: 7px 11px;
  border-radius: 10px;
  background: #e0f2fe;
  color: #0284c7;
  text-decoration: none;
  font-weight: 600;
  white-space: nowrap;
}

.progress-card {
  display: flex;
  align-items: center;
  gap: 18px;
}

.progress-ring {
  width: 108px;
  height: 108px;
  border-radius: 50%;
  background: conic-gradient(#0284c7 0deg, #e5e7eb 0deg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background .6s ease;
  flex-shrink: 0;
}

.progress-inner {
  width: 78px;
  height: 78px;
  background: #fff;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

.progress-percent {
  font-size: 1.2rem;
  font-weight: 700;
  color: #0284c7;
}

.progress-label {
  font-size: .72rem;
  opacity: .65;
}

.progress-info {
  flex: 1;
}

.progress-info h3 {
  font-size: 1rem;
  margin-bottom: 6px;
}

.progress-info p {
  font-size: .82rem;
  opacity: .7;
  margin-bottom: 10px;
}

.progress-bar {
  width: 100%;
  height: 9px;
  background: #e5e7eb;
  border-radius: 999px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  width: 0%;
  background: #0284c7;
  border-radius: 999px;
  transition: width .6s ease;
}

.amal-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 0;
  border-bottom: 1px solid #e5e7eb;
  transition: background .3s ease, transform .25s ease;
}

.amal-item:last-child {
  border-bottom: none;
}

.amal-item.checked {
  background: #ecfeff;
  margin: 0 -10px;
  padding-left: 10px;
  padding-right: 10px;
  border-radius: 12px;
}

.amal-item.pop {
  animation: softPulse .42s ease;
}

@keyframes softPulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.015); }
  100% { transform: scale(1); }
}

.amal-item label {
  flex: 1;
  font-size: .95rem;
}

input[type="checkbox"] {
  display: none;
}

.checkmark {
  width: 25px;
  height: 25px;
  border-radius: 8px;
  border: 2px solid #cbd5e1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .25s ease;
  flex-shrink: 0;
}

.checkmark::after {
  content: "✓";
  color: #fff;
  font-size: .85rem;
  transform: scale(0);
  transition: transform .2s ease;
}

input[type="checkbox"]:checked + .checkmark {
  background: #0284c7;
  border-color: #0284c7;
  box-shadow: 0 0 0 4px rgba(2,132,199,.12);
}

input[type="checkbox"]:checked + .checkmark::after {
  transform: scale(1);
}

.custom-box {
  display: flex;
  gap: 8px;
  margin-top: 10px;
}

.custom-box input {
  flex: 1;
  padding: 11px;
  border-radius: 12px;
  border: 1px solid #e5e7eb;
  font-size: .9rem;
}

.custom-box button {
  padding: 10px 14px;
  border-radius: 12px;
  border: none;
  background: #0284c7;
  color: #fff;
  font-weight: 600;
}

hr {
  margin: 16px 0;
  opacity: .3;
}

@media (max-width: 480px) {
  .progress-ring {
    width: 94px;
    height: 94px;
  }

  .progress-inner {
    width: 68px;
    height: 68px;
  }

  .daily-title {
    font-size: 1rem;
  }
}
</style>
</head>

<body class="page-daily">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>My Daily Amal</div>
    <div class="judul-surah">Evaluasi ibadah harian</div>
  </div>
</header>

<main class="daily-container">

  <section class="progress-card">
    <div class="progress-ring" id="progressRing">
      <div class="progress-inner">
        <div class="progress-percent" id="progressPercent">0%</div>
        <div class="progress-label">selesai</div>
      </div>
    </div>

    <div class="progress-info">
      <h3 id="progressTitle">Semangat mulai hari ini</h3>
      <p id="progressText">0 amal selesai hari ini.</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </section>

  <div class="daily-card" id="amalContainer">
    <div class="daily-head">
      <div>
        <div class="daily-title">📋 Checklist Amal</div>
        <div class="daily-date" id="todayDate"></div>
      </div>

      <a href="amal_list.html" class="setting-btn">⚙ Atur Amal</a>
    </div>

    <div id="amalList"></div>
  </div>

</main>

<nav class="bottom-nav">
  <a href="../index.html">Home</a>
  <a href="quran.html">Al-Qur'an</a>
  <a href="bookmark.html">Bookmark</a>
  <a href="about.html">Tentang</a>
</nav>

<script>
const today = new Date().toISOString().slice(0, 10);
document.getElementById('todayDate').textContent = `Tanggal: ${today}`;

const progressRing = document.getElementById('progressRing');
const progressPercent = document.getElementById('progressPercent');
const progressFill = document.getElementById('progressFill');
const progressText = document.getElementById('progressText');
const progressTitle = document.getElementById('progressTitle');
const amalList = document.getElementById('amalList');

function getDailyData() {
  const all = JSON.parse(localStorage.getItem('dailyAmal')) || {};
  return all[today] || {};
}

function saveDailyData(data) {
  const all = JSON.parse(localStorage.getItem('dailyAmal')) || {};
  all[today] = data;
  localStorage.setItem('dailyAmal', JSON.stringify(all));
}

function getAmalConfig() {
  return JSON.parse(localStorage.getItem('amalConfig')) || {};
}

function getCustomAmal() {
  return JSON.parse(localStorage.getItem('customAmal')) || [];
}

function saveCustomAmal(list) {
  localStorage.setItem('customAmal', JSON.stringify(list));
}

const dailyData = getDailyData();
const amalConfig = getAmalConfig();
const customAmal = getCustomAmal();

const amalGroups = [
  {
    title: 'Sholat 5 Waktu',
    keys: {
      sholat5: 'Sholat 5 Waktu',
      sholat5_subuh: 'Subuh',
      sholat5_dzuhur: 'Dzuhur',
      sholat5_ashar: 'Ashar',
      sholat5_maghrib: 'Maghrib',
      sholat5_isya: 'Isya'
    }
  },
  {
    title: 'Sholat Berjamaah',
    keys: {
      jamaah: 'Sholat Berjamaah',
      jamaah_subuh: 'Subuh',
      jamaah_dzuhur: 'Dzuhur',
      jamaah_ashar: 'Ashar',
      jamaah_maghrib: 'Maghrib',
      jamaah_isya: 'Isya'
    }
  },
  {
    title: 'Sholat Sunnah',
    keys: {
      sunnah: 'Sholat Sunnah',
      rawatib: 'Rawatib',
      dhuha: 'Dhuha',
      tahajjud: 'Tahajjud',
      witir: 'Witir',
      tahiyatul: 'Tahiyatul Masjid'
    }
  },
  {
    title: 'Tilawah Al-Qur’an',
    keys: {
      tilawah: 'Tilawah Al-Qur’an',
      tilawah_ayat: '1 Ayat',
      tilawah_halaman: '1 Halaman',
      tilawah_juz: '1 Juz'
    }
  },
  {
    title: 'Dzikir',
    keys: {
      dzikir: 'Dzikir',
      dzikir_pagi: 'Dzikir Pagi',
      dzikir_petang: 'Dzikir Petang'
    }
  }
];

function renderAmal() {
  amalList.innerHTML = '';

  amalGroups.forEach(group => {
    const activeKeys = Object.keys(group.keys).filter(key => amalConfig[key]);

    if (activeKeys.length === 0) return;

    const groupBox = document.createElement('div');
    groupBox.className = 'amal-group';

    const groupTitle = document.createElement('div');
    groupTitle.className = 'amal-group-title';
    groupTitle.textContent = group.title;

    groupBox.appendChild(groupTitle);

    activeKeys.forEach(key => {
      const item = createCheckboxItem(key, group.keys[key]);
      groupBox.appendChild(item);
    });

    amalList.appendChild(groupBox);
  });

  customAmal.forEach(item => {
    if (amalConfig[item.key] !== false) {
      const itemEl = createCheckboxItem(item.key, item.label);
      amalList.appendChild(itemEl);
    }
  });

  updateProgress();
}

function createCheckboxItem(key, label) {
  const div = document.createElement('div');
  div.className = 'amal-item';

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.id = key;
  cb.checked = !!dailyData[key];

  const check = document.createElement('span');
  check.className = 'checkmark';

  const lbl = document.createElement('label');
  lbl.setAttribute('for', key);
  lbl.textContent = label;

  cb.addEventListener('change', () => {
    dailyData[key] = cb.checked;
    saveDailyData(dailyData);

    div.classList.toggle('checked', cb.checked);
    div.classList.remove('pop');
    void div.offsetWidth;
    div.classList.add('pop');

    updateProgress();
  });

  div.classList.toggle('checked', cb.checked);

  div.appendChild(cb);
  div.appendChild(check);
  div.appendChild(lbl);

  check.addEventListener('click', () => cb.click());

  return div;
}
  
  customAmal.forEach(item => {
    addCheckbox(item.key, item.label);
  });

  updateProgress();
}

function addCheckbox(key, label) {
  const div = document.createElement('div');
  div.className = 'amal-item';

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.id = key;
  cb.checked = !!dailyData[key];

  const check = document.createElement('span');
  check.className = 'checkmark';

  const lbl = document.createElement('label');
  lbl.setAttribute('for', key);
  lbl.textContent = label;

  cb.addEventListener('change', () => {
    dailyData[key] = cb.checked;
    saveDailyData(dailyData);

    div.classList.toggle('checked', cb.checked);
    div.classList.remove('pop');
    void div.offsetWidth;
    div.classList.add('pop');

    updateProgress();
  });

  div.classList.toggle('checked', cb.checked);

  div.appendChild(cb);
  div.appendChild(check);
  div.appendChild(lbl);

  check.addEventListener('click', () => cb.click());

  amalList.appendChild(div);
}

function updateProgress() {
  const items = amalList.querySelectorAll('input[type="checkbox"]');
  const total = items.length;
  let checked = 0;

  items.forEach(item => {
    if (item.checked) checked++;
  });

  const percent = total ? Math.round((checked / total) * 100) : 0;
  const degree = (percent / 100) * 360;

  progressRing.style.background =
    `conic-gradient(#0284c7 ${degree}deg, #e5e7eb ${degree}deg)`;

  progressPercent.textContent = `${percent}%`;
  progressFill.style.width = `${percent}%`;
  progressText.textContent = `${checked} dari ${total} amal selesai hari ini.`;

  if (total === 0) {
    progressTitle.textContent = 'Belum ada amal aktif';
    progressText.textContent = 'Atur daftar amal terlebih dahulu.';
  } else if (percent === 0) {
    progressTitle.textContent = 'Semangat mulai hari ini';
  } else if (percent < 40) {
    progressTitle.textContent = 'MasyaAllah, teruskan';
  } else if (percent < 75) {
    progressTitle.textContent = 'Progres sangat baik';
  } else if (percent < 100) {
    progressTitle.textContent = 'Hampir selesai';
  } else {
    progressTitle.textContent = 'Alhamdulillah, lengkap';
  }
}

renderAmal();
</script>

</body>
</html>
