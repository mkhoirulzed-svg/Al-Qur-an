<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kontak</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.page-kontak{
  background:var(--bg);
}

.kontak-container{
  padding:18px 18px 110px;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header-title>div:first-child{
  font-size:17px;
  font-weight:800;
  color:var(--primary);
}

.judul-surah{
  font-size:12px;
  color:var(--text-secondary);
}

.kontak-card{
  background:var(--card);
  border-radius:24px;
  padding:24px 20px;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
  text-align:center;
  animation:fadeUp .35s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

.kontak-icon{
  width:72px;
  height:72px;
  border-radius:24px;
  margin:0 auto 16px;
  background:linear-gradient(145deg,var(--primary-ghost-strong),var(--primary-ghost));
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
}

.kontak-title{
  font-size:18px;
  font-weight:800;
  color:var(--text);
  margin-bottom:6px;
}

.kontak-desc{
  font-size:13px;
  color:var(--text-secondary);
  line-height:1.6;
  margin-bottom:22px;
}

.info-box{
  background:var(--primary-ghost);
  border-radius:18px;
  padding:16px;
  margin-bottom:14px;
  text-align:left;
}

.info-label{
  font-size:12px;
  color:var(--text-secondary);
  margin-bottom:5px;
}

.info-value{
  font-size:15px;
  font-weight:800;
  color:var(--primary);
  word-break:break-word;
}

.email-btn{
  margin-top:10px;
  width:100%;
  border:none;
  border-radius:18px;
  padding:15px;
  background:linear-gradient(135deg,var(--primary),var(--primary-hover));
  color:#fff;
  font-size:15px;
  font-weight:800;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  box-shadow:var(--shadow-sm);
}

.email-btn:active{
  transform:scale(.985);
}
</style>
</head>

<body class="page-kontak">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>Kontak</div>
    <div class="judul-surah">Informasi pengembang aplikasi</div>
  </div>
</header>

<main class="kontak-container">

  <div class="kontak-card">
    <div class="kontak-icon">
      <i class="fas fa-envelope-open-text"></i>
    </div>

    <div class="kontak-title">Hubungi Kami</div>
    <div class="kontak-desc">
      Untuk pertanyaan, masukan, laporan masalah, atau saran pengembangan aplikasi,
      silakan hubungi melalui email berikut.
    </div>

    <div class="info-box">
      <div class="info-label">Publisher</div>
      <div class="info-value">ZAIDA Digital Labs</div>
    </div>

    <div class="info-box">
      <div class="info-label">Email</div>
      <div class="info-value">mkhoirulzed@gmail.com</div>
    </div>

    <button class="email-btn" onclick="sendEmail()">
      <i class="fas fa-paper-plane"></i>
      Kirim Email
    </button>
  </div>

</main>

<div id="footer"></div>
<script src="../data/loader.js"></script>

<script>
loadFooter();

function sendEmail(){
  window.location.href = "mailto:mkhoirulzed@gmail.com?subject=Kontak%20Aplikasi%20Al-Quran";
}
</script>

</body>
</html>
