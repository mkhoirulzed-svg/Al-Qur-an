<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilih Amal Harian</title>

<link rel="stylesheet" href="../style.css">

<style>
/* =========================
   AMAL LIST STYLE
========================= */
.page-daily {
  background: #f8fafc;
}

.daily-container {
  padding: 16px;
}

.daily-card {
  background: #fff;
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 80px; /* ruang tombol */
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}

.daily-title {
  font-size: 1.1rem;
  font-weight: 600;
  margin-bottom: 4px;
}

.daily-desc {
  font-size: 0.85rem;
  opacity: 0.7;
  margin-bottom: 12px;
}

.amal-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid #e5e7eb;
}

.amal-item:last-child {
  border-bottom: none;
}

.amal-item label {
  flex: 1;
  font-size: 0.95rem;
}

input[type="checkbox"] {
  transform: scale(1.2);
  accent-color: #0284c7;
}

/* =========================
   BUTTON SIMPAN
========================= */
.save-bar {
  position: fixed;
  bottom: 56px; /* di atas bottom-nav */
  left: 0;
  right: 0;
  padding: 12px 16px;
  background: #f8fafc;
}

.save-btn {
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 14px;
  background: #0284c7;
  color: #fff;
  font-size: 1rem;
  font-weight: 600;
}
</style>
</head>

<body class="page-daily">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>Amal Harian</div>
    <div class="judul-surah">Pilih amal yang ingin dicatat</div>
  </div>
</header>

<main class="daily-container">

  <div class="daily-card">
    <div class="daily-title">✅ Daftar Amal</div>
    <div class="daily-desc">
      Amal yang dipilih akan muncul di halaman <b>My Daily Amal</b>
    </div>

    <div class="amal-item">
      <input type="checkbox" data-key="sholat5">
      <label>Sholat 5 Waktu</label>
    </div>

    <div class="amal-item">
      <input type="checkbox" data-key="jamaah">
      <label>Sholat Berjamaah</label>
    </div>

    <div class="amal-item">
      <input type="checkbox" data-key="sunnah">
      <label>Sholat Sunnah</label>
    </div>

    <div class="amal-item">
      <input type="checkbox" data-key="tilawah">
      <label>Tilawah Al-Qur’an</label>
    </div>

    <div class="amal-item">
      <input type="checkbox" data-key="dzikir">
      <label>Dzikir Pagi & Petang</label>
    </div>

    <div class="amal-item">
      <input type="checkbox" data-key="sedekah">
      <label>Sedekah</label>
    </div>

    <div class="amal-item">
      <input type="checkbox" data-key="kajian">
      <label>Mengikuti Kajian</label>
    </div>

    <div class="amal-item">
      <input type="checkbox" data-key="istighfar">
      <label>Istighfar</label>
    </div>

  </div>

</main>

<!-- TOMBOL SIMPAN -->
<div class="save-bar">
  <button class="save-btn" id="saveAmal">
    💾 Simpan & Kembali
  </button>
</div>

<nav class="bottom-nav">
  <a href="../index.html">Home</a>
  <a href="quran.html">Al-Qur'an</a>
  <a href="bookmark.html">Bookmark</a>
  <a href="about.html">Tentang</a>
</nav>

<script>
/* =========================
   SIMPAN PILIHAN AMAL
========================= */

function getAmalConfig() {
  return JSON.parse(localStorage.getItem('amalConfig')) || {};
}

function saveAmalConfig(data) {
  localStorage.setItem('amalConfig', JSON.stringify(data));
}

const config = getAmalConfig();

/* INIT CHECKBOX */
document.querySelectorAll('input[type="checkbox"]').forEach(cb => {
  const key = cb.dataset.key;
  cb.checked = !!config[key];

  cb.addEventListener('change', () => {
    config[key] = cb.checked;
  });
});

/* SIMPAN & REDIRECT */
document.getElementById('saveAmal').addEventListener('click', () => {
  saveAmalConfig(config);
  window.location.href = 'my-daily-amal.html';
});
</script>

</body>
</html>
