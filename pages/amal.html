<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amal Harian</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css">

<style>
.amal-card {
  background: #fff;
  border-radius: 14px;
  padding: 18px 16px;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 14px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.06);
  cursor: pointer;
}

.amal-icon {
  font-size: 1.8rem;
}

.amal-title {
  font-size: 1.05rem;
  font-weight: 600;
  color: #1e293b;
}

.amal-desc {
  font-size: 0.85rem;
  opacity: 0.75;
  margin-top: 2px;
}
</style>
</head>

<body>

<header class="app-header">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <h1 class="header-title">Amal & Ibadah</h1>
</header>

<main class="container">

  <div class="amal-card" onclick="location.href='ramadhan.html'">
    <div class="amal-icon">🌙</div>
    <div>
      <div class="amal-title">Ramadhan Tracker</div>
      <div class="amal-desc">
        Pantau puasa, tarawih, tilawah & ibadah Ramadhan
      </div>
    </div>
  </div>

  <div class="amal-card" onclick="location.href='my-daily-amal.html'">
    <div class="amal-icon">📖</div>
    <div>
      <div class="amal-title">My Daily Amal</div>
      <div class="amal-desc">
        Checklist amal harian & evaluasi diri
      </div>
    </div>
  </div>

  <div class="amal-card" onclick="location.href='jumat-berkah.html'">
    <div class="amal-icon">🤲</div>
    <div>
      <div class="amal-title">Jumat Berkah</div>
      <div class="amal-desc">
        Amalan sunnah & sedekah hari Jumat
      </div>
    </div>
  </div>

</main>

<div id="footer"></div>

<script src="../data/loader.js"></script>
<script>
  loadFooter();
</script>

</body>
</html>
