<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalender Hijriah</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.page-kalender{background:var(--bg);}
.kalender-container{padding:18px 18px 110px;}

.nav-btn{
  width:42px;height:42px;border:none;border-radius:14px;
  background:var(--card);color:var(--primary);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{flex:1;display:flex;flex-direction:column;}
.header-title>div:first-child{font-size:17px;font-weight:800;color:var(--primary);}
.judul-surah{font-size:12px;color:var(--text-secondary);}

.cal-card{
  background:var(--card);
  border-radius:24px;
  padding:16px;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
  animation:fadeUp .35s ease both;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(12px);}
  to{opacity:1;transform:translateY(0);}
}

.cal-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.month-title{
  font-size:16px;
  font-weight:800;
  color:var(--primary);
}

.month-sub{
  font-size:12px;
  color:var(--text-secondary);
  margin-top:2px;
}

.month-nav{
  display:flex;
  gap:8px;
}

.month-nav button{
  width:38px;height:38px;border:none;border-radius:14px;
  background:var(--primary-ghost);
  color:var(--primary);
  font-weight:800;
}

.week-row,.calendar-grid{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:7px;
}

.week-row{
  margin-bottom:8px;
}

.week-row div{
  text-align:center;
  font-size:11px;
  font-weight:800;
  color:var(--text-secondary);
}

.day-cell{
  min-height:68px;
  border:none;
  border-radius:16px;
  background:var(--primary-ghost);
  padding:7px 5px;
  text-align:left;
  position:relative;
  transition:.2s ease;
  color:var(--text);
}

.day-cell:active{
  transform:scale(.96);
}

.day-cell.empty{
  background:transparent;
  pointer-events:none;
}

.day-cell.today{
  outline:2px solid var(--primary);
  background:#fff;
}

.day-cell.friday{
  background:rgba(239,68,68,.13);
}

.day-cell.monday-thursday{
  background:rgba(245,158,11,.16);
}

.day-cell.ayyam{
  background:linear-gradient(145deg,rgba(245,158,11,.18),rgba(10,77,58,.12));
}

.day-cell.event{
  box-shadow:inset 0 0 0 2px rgba(10,77,58,.25);
}

.g-date{
  font-size:11px;
  font-weight:800;
  color:var(--text-secondary);
}

.h-date{
  font-size:17px;
  font-weight:900;
  color:var(--primary);
  margin-top:3px;
}

.badge-dot{
  width:7px;height:7px;border-radius:50%;
  background:var(--primary);
  position:absolute;
  right:8px;
  top:8px;
}

.legend{
  display:grid;
  gap:8px;
  margin-top:14px;
  font-size:12px;
  color:var(--text-secondary);
}

.legend span{
  display:flex;
  align-items:center;
  gap:8px;
}

.lg{
  width:14px;height:14px;border-radius:5px;
  display:inline-block;
}

.lg-red{background:rgba(239,68,68,.18);}
.lg-yellow{background:rgba(245,158,11,.22);}
.lg-green{background:rgba(10,77,58,.18);}

.info-card{
  margin-top:16px;
  background:var(--card);
  border-radius:22px;
  padding:16px;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
}

.info-title{
  font-size:16px;
  font-weight:800;
  color:var(--primary);
  margin-bottom:6px;
}

.info-text{
  font-size:13px;
  color:var(--text-secondary);
  line-height:1.55;
}

.loading{
  text-align:center;
  padding:22px;
  font-size:13px;
  color:var(--text-secondary);
}
</style>
</head>

<body class="page-kalender">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none" stroke="currentColor" stroke-width="2.5"
      stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>Kalender Hijriah</div>
    <div class="judul-surah">Hijriah, Masehi & hari penting Islam</div>
  </div>
</header>

<main class="kalender-container">

  <section class="cal-card">
    <div class="cal-top">
      <div>
        <div class="month-title" id="monthTitle">Memuat...</div>
        <div class="month-sub" id="hijriMonthTitle">Kalender Hijriah</div>
      </div>

      <div class="month-nav">
        <button onclick="changeMonth(-1)">
          <i class="fas fa-chevron-left"></i>
        </button>
        <button onclick="goToday()">
          <i class="fas fa-calendar-day"></i>
        </button>
        <button onclick="changeMonth(1)">
          <i class="fas fa-chevron-right"></i>
        </button>
      </div>
    </div>

    <div class="week-row">
      <div>Min</div><div>Sen</div><div>Sel</div><div>Rab</div>
      <div>Kam</div><div>Jum</div><div>Sab</div>
    </div>

    <div class="calendar-grid" id="calendarGrid">
      <div class="loading">Memuat kalender...</div>
    </div>

    <div class="legend">
      <span><i class="lg lg-red"></i> Jumat</span>
      <span><i class="lg lg-yellow"></i> Senin / Kamis</span>
      <span><i class="lg lg-green"></i> Ayyamul Bidh / hari penting Islam</span>
    </div>
  </section>

  <section class="info-card" id="dateInfo">
    <div class="info-title">Pilih tanggal</div>
    <div class="info-text">
      Klik salah satu tanggal untuk melihat keterangan Hijriah dan hari penting Islam.
    </div>
  </section>

</main>

<div id="footer"></div>
<script src="../data/loader.js"></script>

<script>
loadFooter();

const monthNames = [
  "Januari","Februari","Maret","April","Mei","Juni",
  "Juli","Agustus","September","Oktober","November","Desember"
];

const dayNames = [
  "Ahad","Senin","Selasa","Rabu","Kamis","Jumat","Sabtu"
];

let currentDate = new Date();
let calendarData = [];

const grid = document.getElementById("calendarGrid");
const monthTitle = document.getElementById("monthTitle");
const hijriMonthTitle = document.getElementById("hijriMonthTitle");
const dateInfo = document.getElementById("dateInfo");

function changeMonth(step){
  currentDate.setMonth(currentDate.getMonth() + step);
  loadCalendar();
}

function goToday(){
  currentDate = new Date();
  loadCalendar();
}

async function loadCalendar(){
  const month = currentDate.getMonth() + 1;
  const year = currentDate.getFullYear();

  monthTitle.textContent = monthNames[month - 1] + " " + year;
  hijriMonthTitle.textContent = "Memuat data Hijriah...";
  grid.innerHTML = `<div class="loading">Memuat kalender...</div>`;

  try{
    const url = `https://api.aladhan.com/v1/gToHCalendar/${month}/${year}`;
    const res = await fetch(url);
    const json = await res.json();

    if(!json.data) throw new Error("Data tidak ditemukan");

    calendarData = json.data;
    renderCalendar(month, year);

  }catch(err){
    grid.innerHTML = `<div class="loading">Gagal memuat kalender. Coba periksa koneksi internet.</div>`;
    hijriMonthTitle.textContent = "API tidak tersedia";
  }
}

function renderCalendar(month, year){
  grid.innerHTML = "";

  const firstDay = new Date(year, month - 1, 1).getDay();

  for(let i = 0; i < firstDay; i++){
    const empty = document.createElement("button");
    empty.className = "day-cell empty";
    grid.appendChild(empty);
  }

  const hijriMonths = new Set();

  calendarData.forEach(item => {
    const gDay = Number(item.gregorian.day);
    const hDay = Number(item.hijri.day);
    const hMonthId = Number(item.hijri.month.number);
    const hYear = item.hijri.year;

    hijriMonths.add(`${item.hijri.month.en} ${hYear} H`);

    const dateObj = new Date(year, month - 1, gDay);
    const dayIndex = dateObj.getDay();

    const localEvent = getLocalIslamicEvent(hDay, hMonthId);

    const cell = document.createElement("button");
    cell.className = "day-cell";

    if(isToday(dateObj)) cell.classList.add("today");
    if(dayIndex === 5) cell.classList.add("friday");
    if(dayIndex === 1 || dayIndex === 4) cell.classList.add("monday-thursday");
    if(hDay >= 13 && hDay <= 15) cell.classList.add("ayyam");
    if(localEvent) cell.classList.add("event");

    cell.innerHTML = `
      <div class="g-date">${gDay} M</div>
      <div class="h-date">${hDay}</div>
      ${localEvent ? `<span class="badge-dot"></span>` : ``}
    `;

    cell.onclick = () => showDateInfo(item, dayIndex);
    grid.appendChild(cell);
  });

  hijriMonthTitle.textContent = Array.from(hijriMonths).join(" / ");
}
  const hijriMonths = new Set();

  calendarData.forEach(item => {
    const gDay = Number(item.gregorian.day);
    const hDay = Number(item.hijri.day);
    const hMonth = item.hijri.month.en;
    const hMonthId = Number(item.hijri.month.number);
    const hYear = item.hijri.year;
    const weekday = item.gregorian.weekday.en;
    const holidays = item.hijri.holidays || [];

    hijriMonths.add(`${item.hijri.month.en} ${hYear} H`);

    const cell = document.createElement("button");
    cell.className = "day-cell";

    const dateObj = new Date(year, month - 1, gDay);
    const dayIndex = dateObj.getDay();

    if(isToday(dateObj)) cell.classList.add("today");
    if(dayIndex === 5) cell.classList.add("friday");
    if(dayIndex === 1 || dayIndex === 4) cell.classList.add("monday-thursday");
    if(hDay >= 13 && hDay <= 15) cell.classList.add("ayyam");
    if(holidays.length || getLocalIslamicEvent(hDay, hMonthId)) cell.classList.add("event");

    cell.innerHTML = `
      <div class="g-date">${gDay} M</div>
      <div class="h-date">${hDay}</div>
      ${(holidays.length || getLocalIslamicEvent(hDay, hMonthId)) ? `<span class="badge-dot"></span>` : ``}
    `;

    cell.onclick = () => showDateInfo(item, dayIndex);
    grid.appendChild(cell);
  });

  hijriMonthTitle.textContent = Array.from(hijriMonths).join(" / ");
}

function showDateInfo(item, dayIndex){
  const g = item.gregorian;
  const h = item.hijri;

  const hDay = Number(h.day);
  const hMonthId = Number(h.month.number);

  const localEvent = getLocalIslamicEvent(hDay, hMonthId);

  let notes = [];

  if(dayIndex === 5) notes.push("Hari Jumat");
  if(dayIndex === 1 || dayIndex === 4) notes.push("Disunnahkan puasa Senin/Kamis");
  if(hDay >= 13 && hDay <= 15) notes.push("Ayyamul Bidh");
  if(localEvent) notes.push(localEvent);

  dateInfo.innerHTML = `
    <div class="info-title">${dayNames[dayIndex]}, ${g.day} ${g.month.en} ${g.year}</div>
    <div class="info-text">
      <b>${h.day} ${h.month.en} ${h.year} H</b><br><br>
      ${notes.length ? notes.map(n => `• ${n}`).join("<br>") : "Tidak ada keterangan khusus pada tanggal ini."}
    </div>
  `;
}

function getLocalIslamicEvent(day, month){
  const events = {
    "1-1":"Tahun Baru Islam",
    "10-1":"Hari Asyura",
    "12-3":"Maulid Nabi",
    "27-7":"Isra Mi'raj",
    "15-8":"Nisfu Sya'ban",
    "1-9":"Awal Ramadan",
    "17-9":"Nuzulul Qur'an",
    "1-10":"Idul Fitri",
    "9-12":"Hari Arafah",
    "10-12":"Idul Adha",
    "11-12":"Hari Tasyrik",
    "12-12":"Hari Tasyrik",
    "13-12":"Hari Tasyrik"
  };

  return events[`${day}-${month}`] || "";
}

function isToday(date){
  const today = new Date();
  return date.getDate() === today.getDate() &&
         date.getMonth() === today.getMonth() &&
         date.getFullYear() === today.getFullYear();
}

loadCalendar();
</script>

</body>
</html>
