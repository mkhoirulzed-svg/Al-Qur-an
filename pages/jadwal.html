<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Sholat</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
   
<style>
/* =========================
   JADWAL SHOLAT STYLE
========================= */

.page-sholat{
  background:var(--bg);
}

.sholat-container{
  padding:18px 18px 110px;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#judul-sholat{
  font-size:17px;
  font-weight:800;
  color:var(--primary);
}

#lokasi-aktif{
  font-size:12px;
  color:var(--text-secondary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.kota-select{
  width:100%;
  min-height:48px;
  padding:12px 14px;
  font-size:14px;
  font-weight:700;
  font-family:'Plus Jakarta Sans',sans-serif;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.7);
  margin-bottom:12px;
  background:var(--card);
  color:var(--text);
  box-shadow:var(--shadow-sm);
  outline:none;
}

.kota-select:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(10,77,58,.12);
}

#autoLocationBtn{
  border:none;
  background:linear-gradient(145deg,var(--primary),var(--primary-hover));
  color:#fff;
  margin-bottom:18px;
  cursor:pointer;
}

#jadwalSholat{
  display:flex;
  flex-direction:column;
  gap:12px;
}

#jadwalSholat p{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  text-align:center;
  color:var(--text-secondary);
  box-shadow:var(--shadow-sm);
}

.jadwal-card{
  background:var(--card);
  border-radius:20px;
  padding:17px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
  transition:.25s ease;
}

.jadwal-card:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}

.jadwal-card span:first-child{
  font-size:15px;
  font-weight:800;
  color:var(--text);
}

.jadwal-card .jam{
  font-size:18px;
  font-weight:800;
  color:var(--primary);
  padding:7px 11px;
  border-radius:999px;
  background:var(--primary-ghost);
}

.jadwal-card.active{
  background:linear-gradient(145deg,#0a4d3a,#0f6e52);
  color:#fff;
  border-left:none;
  box-shadow:0 8px 28px rgba(10,77,58,.22);
}

.jadwal-card.active span:first-child,
.jadwal-card.active .jam{
  color:#fff;
}

.jadwal-card.active .jam{
  background:rgba(255,255,255,.18);
}
</style>
</head>

<body class="page-sholat">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
  <div id="judul-sholat">Jadwal Sholat</div>
  <div id="lokasi-aktif" class="judul-surah"></div>
</div>

</header>

<main class="sholat-container">
 <select class="kota-select" id="kotaSelect"></select>
<button id="autoLocationBtn" class="kota-select">
  📍 Gunakan Lokasi Saat Ini
</button>
  <div id="jadwalSholat">
    <p>Memuat jadwal sholat...</p>
  </div>
</main>
<script src="../data/kota.js"></script>
<script>

   const kotaSelect = document.getElementById('kotaSelect');

// isi dropdown kota
KOTA_INDONESIA.forEach(kota => {
  const opt = document.createElement('option');
  opt.value = kota;
  opt.textContent = kota;
  kotaSelect.appendChild(opt);
   kotaSelect.value = "Palangka Raya";

});

const jadwalEl = document.getElementById('jadwalSholat');
const autoBtn = document.getElementById('autoLocationBtn');
const lokasiEl = document.getElementById('lokasi-aktif');

/* =========================
   RENDER JADWAL (GLOBAL)
========================= */
function renderJadwal(t) {
  const jadwal = [
    ['Subuh', t.Fajr],
    ['Dzuhur', t.Dhuhr],
    ['Ashar', t.Asr],
    ['Maghrib', t.Maghrib],
    ['Isya', t.Isha]
  ];

  const now = new Date();
  jadwalEl.innerHTML = '';

  jadwal.forEach(([nama, jam]) => {
    const [h, m] = jam.split(':');
    const waktu = new Date();
    waktu.setHours(h, m, 0);

    const active =
      now >= waktu &&
      now < new Date(waktu.getTime() + 60 * 60 * 1000);

    const div = document.createElement('div');
    div.className = 'jadwal-card' + (active ? ' active' : '');
    div.innerHTML = `
      <span>${nama}</span>
      <span class="jam">${jam}</span>
    `;
    jadwalEl.appendChild(div);
  });
}

/* =========================
   LOAD JADWAL BY CITY
========================= */
async function loadJadwal(kota) {
  jadwalEl.innerHTML = '<p>Memuat jadwal sholat...</p>';

  const today = new Date();
  const date = today.getDate();
  const month = today.getMonth() + 1;
  const year = today.getFullYear();

  try {
    const res = await fetch(
      `https://api.aladhan.com/v1/timingsByCity/${date}-${month}-${year}?city=${kota}&country=Indonesia&method=11`
    );
    const json = await res.json();
    renderJadwal(json.data.timings);
  } catch (err) {
    jadwalEl.innerHTML = '<p>Gagal memuat jadwal sholat.</p>';
  }
}

/* =========================
   LOAD BY COORDINATE (GPS)
========================= */
async function loadJadwalByCoord(lat, lon) {
  jadwalEl.innerHTML = '<p>Mendeteksi lokasi...</p>';

  try {
    const res = await fetch(
      `https://api.aladhan.com/v1/timings?latitude=${lat}&longitude=${lon}&method=11`
    );
    const json = await res.json();
    renderJadwal(json.data.timings);
  } catch (err) {
    jadwalEl.innerHTML = '<p>Gagal memuat jadwal dari lokasi.</p>';
  }
}

/* =========================
   EVENT LISTENER
========================= */
kotaSelect.addEventListener('change', () => {
 lokasiEl.textContent = `🏙️ ${kotaSelect.value}`;
   loadJadwal(kotaSelect.value);
   lokasiEl.textContent = `🏙️ ${kotaSelect.value}`;
});

autoBtn.addEventListener('click', () => {
  if (!navigator.geolocation) {
    alert('Browser tidak mendukung GPS.');
    return;
  }

  jadwalEl.innerHTML = '<p>Meminta izin lokasi...</p>';

  navigator.geolocation.getCurrentPosition(
  pos => {
    const lat = pos.coords.latitude;
    const lon = pos.coords.longitude;

    getNamaLokasi(lat, lon);   // ⬅️ INI
    loadJadwalByCoord(lat, lon);
  },
  () => {
    alert('Izin lokasi ditolak.');
    },
    {
      enableHighAccuracy: true,
      timeout: 10000,
      maximumAge: 60000
    }
  );
});

/* =========================
   LOAD AWAL
========================= */
loadJadwal(kotaSelect.value);
lokasiEl.textContent = `🏙️ ${kotaSelect.value}`;
   
   async function getNamaLokasi(lat, lon) {
  try {
    const res = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`
    );
    const json = await res.json();
 localStorage.setItem("jadwalSholat", JSON.stringify({
    waktu: json.data.timings,
    tanggal: new Date().toDateString()
}));

    const city =
      json.address.city ||
      json.address.town ||
      json.address.village ||
      '';

    const state = json.address.state || '';

    lokasiEl.textContent = `📍 ${city}${state ? ', ' + state : ''}`;
  } catch {
    lokasiEl.textContent = '📍 Lokasi saat ini';
  }
}

   
</script>
<div id="footer"></div>

<script src="../data/loader.js"></script>
<script>
  loadFooter();
</script>

</body>
</html>
