<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tasbih</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.page-tasbih{
  background:var(--bg);
}

.tasbih-container{
  padding:18px 18px 110px;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header-title>div:first-child{
  font-size:17px;
  font-weight:800;
  color:var(--primary);
}

.judul-surah{
  font-size:12px;
  color:var(--text-secondary);
}

.tasbih-card{
  background:var(--card);
  border-radius:26px;
  padding:22px;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
  text-align:center;
  animation:fadeUp .35s ease both;
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(12px);}
  to{opacity:1; transform:translateY(0);}
}

.tasbih-label{
  font-size:13px;
  color:var(--text-secondary);
  margin-bottom:10px;
}

.tasbih-count{
  font-size:76px;
  font-weight:800;
  color:var(--primary);
  line-height:1;
  transition:.18s ease;
}

.tasbih-count.bump{
  transform:scale(1.08);
}

.tasbih-target{
  margin-top:8px;
  font-size:14px;
  color:var(--text-secondary);
}

.progress-wrap{
  width:100%;
  height:10px;
  background:var(--primary-ghost);
  border-radius:99px;
  margin:22px 0;
  overflow:hidden;
}

.progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--primary),var(--primary-hover));
  border-radius:99px;
  transition:width .3s ease;
}

.tap-btn{
  width:190px;
  height:190px;
  border-radius:50%;
  border:none;
  background:linear-gradient(145deg,var(--primary),var(--primary-hover));
  color:#fff;
  font-size:34px;
  box-shadow:0 18px 35px rgba(0,0,0,.18);
  cursor:pointer;
  transition:.18s ease;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin:8px auto 18px;
}

.tap-btn i{
  font-size:38px;
  margin-bottom:8px;
}

.tap-btn span{
  font-size:14px;
  font-weight:700;
}

.tap-btn:active{
  transform:scale(.94);
  box-shadow:0 10px 22px rgba(0,0,0,.15);
}

.target-list{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin:18px 0;
}

.target-btn{
  border:none;
  border-radius:16px;
  background:var(--primary-ghost);
  color:var(--primary);
  padding:12px 6px;
  font-weight:800;
  cursor:pointer;
  transition:.2s ease;
}

.target-btn.active,
.target-btn:hover{
  background:var(--primary);
  color:#fff;
}

.custom-target{
  display:flex;
  gap:10px;
  margin-top:12px;
}

.custom-target input{
  flex:1;
  border:none;
  outline:none;
  border-radius:16px;
  padding:13px 14px;
  background:var(--primary-ghost);
  color:var(--text);
  font-weight:700;
}

.custom-target button{
  border:none;
  border-radius:16px;
  padding:0 16px;
  background:var(--primary);
  color:#fff;
  font-weight:800;
}

.action-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin-top:16px;
}

.action-btn{
  border:none;
  border-radius:18px;
  padding:14px;
  background:var(--card);
  color:var(--primary);
  font-weight:800;
  box-shadow:var(--shadow-sm);
  cursor:pointer;
  transition:.2s ease;
}

.action-btn:active{
  transform:scale(.96);
}

.done-message{
  margin-top:12px;
  font-size:13px;
  font-weight:700;
  color:var(--primary);
  opacity:0;
  transform:translateY(6px);
  transition:.25s ease;
}

.done-message.show{
  opacity:1;
  transform:translateY(0);
}
</style>
</head>

<body class="page-tasbih">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>Tasbih</div>
    <div class="judul-surah">Hitung dzikir harian dengan nyaman</div>
  </div>
</header>

<main class="tasbih-container">

  <section class="tasbih-card">
    <div class="tasbih-label">Jumlah hitungan</div>
    <div class="tasbih-count" id="count">0</div>
    <div class="tasbih-target">
      Target: <span id="targetText">33</span>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <button class="tap-btn" id="tapBtn">
      <i class="fas fa-hand-point-up"></i>
      <span>Ketuk Tasbih</span>
    </button>

    <div class="done-message" id="doneMessage">
      Target tercapai. MasyaAllah.
    </div>
  </section>

  <section class="tasbih-card" style="margin-top:16px;">
    <div class="tasbih-label">Pilih target dzikir</div>

    <div class="target-list">
      <button class="target-btn active" data-target="33">33</button>
      <button class="target-btn" data-target="99">99</button>
      <button class="target-btn" data-target="100">100</button>
      <button class="target-btn" data-target="1000">1000</button>
    </div>

    <div class="custom-target">
      <input type="number" id="customInput" placeholder="Target custom">
      <button onclick="setCustomTarget()">Pakai</button>
    </div>

    <div class="action-row">
      <button class="action-btn" onclick="undoCount()">
        <i class="fas fa-rotate-left"></i> Undo
      </button>
      <button class="action-btn" onclick="resetCount()">
        <i class="fas fa-trash"></i> Reset
      </button>
    </div>
  </section>

</main>

<div id="footer"></div>
<script src="../data/loader.js"></script>

<script>
loadFooter();

let count = Number(localStorage.getItem("tasbih_count")) || 0;
let target = Number(localStorage.getItem("tasbih_target")) || 33;

const countEl = document.getElementById("count");
const targetText = document.getElementById("targetText");
const progressBar = document.getElementById("progressBar");
const tapBtn = document.getElementById("tapBtn");
const doneMessage = document.getElementById("doneMessage");
const targetBtns = document.querySelectorAll(".target-btn");

function updateDisplay(){
  countEl.textContent = count;
  targetText.textContent = target;

  const progress = Math.min((count / target) * 100, 100);
  progressBar.style.width = progress + "%";

  doneMessage.classList.toggle("show", count >= target);

  targetBtns.forEach(btn => {
    btn.classList.toggle("active", Number(btn.dataset.target) === target);
  });

  localStorage.setItem("tasbih_count", count);
  localStorage.setItem("tasbih_target", target);
}

function vibrate(pattern = 25){
  if(navigator.vibrate){
    navigator.vibrate(pattern);
  }
}

function bumpCount(){
  countEl.classList.remove("bump");
  void countEl.offsetWidth;
  countEl.classList.add("bump");
}

tapBtn.addEventListener("click", () => {
  count++;
  bumpCount();

  if(count === target){
    vibrate([120,80,120]);
  }else{
    vibrate(18);
  }

  updateDisplay();
});

targetBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    target = Number(btn.dataset.target);
    count = 0;
    doneMessage.classList.remove("show");
    vibrate(25);
    updateDisplay();
  });
});

function setCustomTarget(){
  const input = document.getElementById("customInput");
  const value = Number(input.value);

  if(!value || value < 1){
    alert("Masukkan target yang benar.");
    return;
  }

  target = value;
  count = 0;
  input.value = "";
  vibrate(30);
  updateDisplay();
}

function undoCount(){
  if(count > 0){
    count--;
    vibrate(20);
    updateDisplay();
  }
}

function resetCount(){
  if(confirm("Reset hitungan tasbih?")){
    count = 0;
    vibrate(30);
    updateDisplay();
  }
}

updateDisplay();
</script>

</body>
</html>
