<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dzikir</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* =========================
   DZIKIR STYLE
========================= */

.page-dzikir{
  background:var(--bg);
}

.dzikir-container{
  padding:18px 18px 110px;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
}

.header-title>div:first-child{
  font-size:17px;
  font-weight:800;
  color:var(--primary);
}

.judul-surah{
  font-size:12px;
  color:var(--text-secondary);
}

.dzikir-card{
  background:var(--card);
  border-radius:22px;
  padding:18px;
  margin-bottom:16px;
  display:flex;
  align-items:center;
  gap:16px;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
  cursor:pointer;
  transition:.25s ease;
}

.dzikir-card:hover{
  transform:translateY(-3px);
  box-shadow:var(--shadow-md);
}

.dzikir-card:active{
  transform:scale(.985);
}

.dzikir-icon{
  width:58px;
  height:58px;
  border-radius:18px;
  background:linear-gradient(
      145deg,
      var(--primary-ghost-strong),
      var(--primary-ghost)
  );
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  flex-shrink:0;
}

.dzikir-card:hover .dzikir-icon{
  background:linear-gradient(
      145deg,
      var(--primary),
      var(--primary-hover)
  );
  color:#fff;
}

.dzikir-title{
  font-size:17px;
  font-weight:800;
  color:var(--text);
  margin-bottom:4px;
}

.dzikir-desc{
  font-size:13px;
  color:var(--text-secondary);
  line-height:1.5;
}
</style>
</head>

<body class="page-dzikir">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div>Dzikir</div>
    <div class="judul-surah">Dzikir harian & amalan lisan</div>
  </div>
</header>

<main class="dzikir-container">

  <div class="dzikir-card" onclick="location.href='dzikir-pagi.html'">
    <div class="dzikir-icon">🌅</div>
    <div>
      <div class="dzikir-title">Dzikir Pagi</div>
      <div class="dzikir-desc">
        Dzikir setelah Subuh hingga matahari terbit
      </div>
    </div>
  </div>

  <div class="dzikir-card" onclick="location.href='dzikir-petang.html'">
    <div class="dzikir-icon">🌇</div>
    <div>
      <div class="dzikir-title">Dzikir Petang</div>
      <div class="dzikir-desc">
        Dzikir setelah Ashar hingga Maghrib
      </div>
    </div>
  </div>

</main>

<div id="footer"></div>
   <script src="../data/loader.js"></script>
<script>
  loadFooter();
</script>

</body>
</html>
