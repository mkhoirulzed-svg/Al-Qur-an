<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmark</title>

 <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
 <style> 
/* =========================
   BOOKMARK
========================= */

.loading{
    text-align:center;
    color:var(--text-secondary);
    padding:30px 0;
}

#bookmarkList{
    display:flex;
    flex-direction:column;
    gap:16px;
}

.bookmark-item{
    background:#fff;
    border-radius:20px;
    padding:18px;
    box-shadow:var(--shadow-sm);
    transition:.25s;
}

.bookmark-item:hover{
    box-shadow:var(--shadow-md);
    transform:translateY(-2px);
}

.bookmark-header{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:14px;
}

.bookmark-header strong{
    display:block;
    font-size:16px;
    color:var(--primary);
    font-weight:800;
}

.bookmark-header small{
    color:var(--text-secondary);
    font-size:12px;
}

.hapus-bookmark{
    width:34px;
    height:34px;
    border:none;
    border-radius:12px;
    background:#fdecec;
    color:#dc2626;
    font-size:18px;
    cursor:pointer;
    transition:.2s;
}

.hapus-bookmark:hover{
    background:#dc2626;
    color:#fff;
}

.bookmark-item .ayat-arab{
    direction:rtl;
    text-align:right;
    font-family:'Amiri',serif;
    font-size:28px;
    line-height:2;
    margin:18px 0;
    color:var(--text);
}

.bookmark-open{
    width:100%;
    border:none;
    border-radius:14px;
    padding:13px;
    background:linear-gradient(145deg,var(--primary),var(--primary-hover));
    color:#fff;
    font-size:14px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
}

.bookmark-open:hover{
    transform:translateY(-1px);
}

.bookmark-open:active{
    transform:scale(.98);
}
</style>
</head>

<body>

<!-- HEADER -->
<header class="app-header">
  <button class="back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>
  <h1 class="header-title">Bookmark</h1>
</header>

<main class="container">

  <div class="quran-toggle">
    <button class="toggle-btn" onclick="location.href='quran.html'">
      Surah
    </button>
    <button class="toggle-btn" onclick="location.href='quran.html?mode=juz'">
      Juz
    </button>
    <button class="toggle-btn active">
      Bookmark
    </button>
  </div>

  <script src="../data/surah-names.js"></script>
  
<!-- CONTENT -->
  <div id="bookmarkList">
    <p class="loading">Memuat bookmark...</p>
  </div>
</main>

<!-- NAV -->
<nav class="bottom-nav">
  <a href="../index.html">Home</a>
  <a href="quran.html">Al-Qur'an</a>
  <a href="bookmark.html" class="active">Bookmark</a>
  <a href="about.html">Tentang</a>
</nav>

<!-- SCRIPT -->
<script>
const list = document.getElementById('bookmarkList');

function renderBookmarks() {
  const bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];

  if (bookmarks.length === 0) {
    list.innerHTML = '<p class="loading">Belum ada bookmark</p>';
    return;
  }

  list.innerHTML = '';

  bookmarks.forEach((b, index) => {
    const item = document.createElement('div');
    item.className = 'bookmark-item';

    item.innerHTML = `
      <div class="bookmark-header">
        <div>
         <strong>
  ${b.mode === 'surah'
    ? b.surahName
    : SURAH_NAMES[b.surah] || 'Surah tidak diketahui'}
</strong>
          <small>Ayat ${b.ayat}</small>
        </div>

        <button class="hapus-bookmark" title="Hapus">✕</button>
      </div>

      <div class="ayat-arab">${b.text}</div>

      <button class="bookmark-open">
Lanjut Membaca →
</button>
    `;

    // buka ayat
    item.querySelector('.bookmark-open').onclick = () => {
      localStorage.setItem('scrollToAyat', b.ayat);
      location.href = `surah.html?no=${b.surah}`;
    };

    // hapus bookmark
    item.querySelector('.hapus-bookmark').onclick = () => {
      bookmarks.splice(index, 1);
      localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
      renderBookmarks();
    };

    list.appendChild(item);
  });
}

renderBookmarks();
</script>

</body>
</html>
