<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mushaf</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">

<style>
/* =========================
   MUSHAF STYLE
========================= */

body{
  background:var(--bg);
}

.mushaf-container{
  max-width:480px;
  margin:0 auto;
  padding:18px 18px 110px;
  font-family:'Amiri',serif;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#judul-juz{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:17px;
  font-weight:800;
  color:var(--primary);
}

.judul-surah{
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:12px;
  color:var(--text-secondary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.surah-header{
  background:linear-gradient(145deg,#0a4d3a,#0f6e52);
  color:#fff;
  text-align:center;
  margin:22px 0 18px;
  padding:18px 14px;
  border-radius:20px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:18px;
  font-weight:800;
  box-shadow:0 8px 28px rgba(10,77,58,.2);
}

.bismillah{
  background:var(--card);
  color:var(--primary);
  text-align:center;
  font-size:2.1rem;
  line-height:2;
  margin:0 0 18px;
  padding:18px 14px;
  border-radius:20px;
  box-shadow:var(--shadow-sm);
}

.mushaf-arab{
  direction:rtl;
  text-align:justify;
  font-size:2rem;
  line-height:2.25;
  word-spacing:2px;
  background:var(--card);
  padding:20px 16px;
  border-radius:22px;
  box-shadow:var(--shadow-sm);
  margin-bottom:18px;
  color:var(--text);
}

.ayat-text{
  cursor:pointer;
  user-select:none;
  transition:.2s ease;
  border-radius:8px;
}

.ayat-text.bookmarked{
  background:rgba(196,154,42,.16);
  color:var(--primary);
  padding:2px 5px;
}

.ayat-no{
  font-size:1.25rem;
  margin:0 5px;
  color:var(--primary);
  cursor:pointer;
  user-select:none;
  transition:.2s ease;
}

.ayat-no.bookmarked{
  color:var(--accent);
  font-weight:700;
}

/* =========================
   TOAST
========================= */

.toast{
  position:fixed;
  bottom:96px;
  left:50%;
  transform:translateX(-50%);
  background:var(--primary);
  color:#fff;
  padding:11px 16px;
  border-radius:14px;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;
  font-weight:700;
  opacity:0;
  pointer-events:none;
  transition:.3s ease;
  z-index:999;
  box-shadow:var(--shadow-lg);
  width:max-content;
  max-width:calc(100% - 36px);
  text-align:center;
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(-6px);
}

/* =========================
   HINT DOUBLE TAP
========================= */

.hint-bookmark{
  position:fixed;
  top:64px;
  left:50%;
  transform:translateX(-50%) translateY(-10px);
  width:calc(100% - 32px);
  max-width:448px;
  background:var(--accent);
  color:#fff;
  text-align:center;
  font-family:'Plus Jakarta Sans',sans-serif;
  font-size:13px;
  font-weight:800;
  padding:11px 14px;
  border-radius:0 0 18px 18px;
  z-index:998;
  opacity:0;
  box-shadow:var(--shadow-md);
  transition:.35s ease;
}

.hint-bookmark.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}
</style>
</head>

<body>

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div id="judul-juz">Juz</div>
    <div id="judul-surah" class="judul-surah"></div>
  </div>
</header>
<div id="hintBookmark" class="hint-bookmark">
  🔴 Double tap ayat untuk bookmark
</div>

<main class="mushaf-container" id="mushafContent">
  <p>Memuat mushaf...</p>
</main>
<div id="toast" class="toast"></div>
<script src="../data/surah-names.js"></script>
<script src="../data/juz-map.js"></script>
<script>
const mushafContent = document.getElementById('mushafContent');
const judulJuz = document.getElementById('judul-juz');

const juzParam = new URLSearchParams(location.search).get('no');
const juzNo = Number(juzParam);
const judulSurah = document.getElementById('judul-surah');

   const toastEl = document.getElementById('toast');

function showToast(msg) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');

  setTimeout(() => {
    toastEl.classList.remove('show');
  }, 1600);
}


if (!juzParam || isNaN(juzNo) || juzNo < 1 || juzNo > 30) {
  mushafContent.innerHTML = '<p>Juz tidak ditemukan.</p>';
  throw new Error('Invalid Juz');
}

judulJuz.textContent = `Juz ${juzNo}`;

const juzInfo = JUZ_MAP.find(j => j.juz === juzNo);
if (!juzInfo) {
  mushafContent.innerHTML = '<p>Juz tidak valid</p>';
  throw new Error('Invalid Juz');
}

function toArabicNumber(num) {
  const d = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
  return String(num).replace(/\d/g, x => d[x]);
}

     function removeBismillah(text) {
  if (!text.includes('بِسْمِ') && !text.includes('بسم')) {
    return text.trim();
  }

  const rahimWords = ['الرَّحِيمِ', 'ٱلرَّحِيمِ'];

  for (const word of rahimWords) {
    const idx = text.indexOf(word);
    if (idx !== -1) {
      return text.slice(idx + word.length).trim();
    }
  }

  return text.trim();
}

 function isBookmarked(juz, surah, ayat) {
  return getBookmarks().some(b =>
    b.mode === 'mushaf' &&
    b.juz == juz &&
    b.surah == surah &&
    b.ayat == ayat
  );
}
 
   
async function loadMushaf({ start, end }) {
  mushafContent.innerHTML = '';

  for (let surah = start[0]; surah <= end[0]; surah++) {
    const res = await fetch(
      `https://api.alquran.cloud/v1/surah/${surah}/editions/ar.alafasy`
    );
    const json = await res.json();
    const arab = json.data[0];

    // HEADER SURAH
   const header = document.createElement('div');
header.className = 'surah-header';
const surahLatin = SURAH_NAMES[surah] || arab.englishName;
header.textContent = `${surahLatin} (${arab.name})`;
mushafContent.appendChild(header);

// set judul surah di header atas (sekali saja)
if (!judulSurah.textContent) {
  judulSurah.textContent = `${surahLatin} (${arab.name})`;
}


    // KUMPULKAN AYAT DALAM 1 BLOK
    let ayatText = '';

    arab.ayahs.forEach(a => {
      const ayatNo = a.numberInSurah;

      if (
        (surah === start[0] && ayatNo < start[1]) ||
        (surah === end[0] && ayatNo > end[1])
      ) return;

      let text = a.text;

      // BISMAILLAH MANUAL (AWAL SURAH)
      if (
        ayatNo === 1 &&
        arab.number !== 1 &&
        arab.number !== 9
      ) {
        const bismillah = document.createElement('div');
        bismillah.className = 'bismillah';
        bismillah.textContent = 'بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ';
        mushafContent.appendChild(bismillah);

        text = removeBismillah(text);
      }
       
const bookmarked = isBookmarked(juzNo, surah, ayatNo)
    ? 'bookmarked'
    : '';
       
     ayatText += `
<span class="ayat-text ${bookmarked}"
  id="ayat-${surah}-${ayatNo}"
  data-juz="${juzNo}"
  data-surah="${surah}"
  data-ayat="${ayatNo}"
>
  ${text}
  <span class="ayat-no">﴿${toArabicNumber(ayatNo)}﴾</span>
</span>
`;

    });

    const block = document.createElement('div');
    block.className = 'mushaf-arab';
    block.innerHTML = ayatText;
    mushafContent.appendChild(block);
  }
}

loadMushaf(juzInfo).then(() => {
  const targetAyat = localStorage.getItem('scrollToAyat');

  if (targetAyat) {
    setTimeout(() => {
      const target = document.getElementById(`ayat-${targetAyat}`);

      if (target) {
        target.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });

        target.classList.add('bookmarked');

        setTimeout(() => {
          target.classList.remove('bookmarked');
        }, 1800);
      }

      localStorage.removeItem('scrollToAyat');
    }, 400);
  }
});

   /* =========================
   BOOKMARK (LONG PRESS)
========================= */
function getBookmarks() {
  return JSON.parse(localStorage.getItem('bookmarks')) || [];
}

function saveBookmarks(data) {
  localStorage.setItem('bookmarks', JSON.stringify(data));
}

let lastTap = 0;

document.addEventListener('click', e => {
  const target = e.target.closest('.ayat-text');
  if (!target) return;

  const now = Date.now();
  const delay = 300; // toleransi double tap (ms)

  if (now - lastTap < delay) {
    toggleBookmark(target);
    lastTap = 0;
  } else {
    lastTap = now;
  }
});


function toggleBookmark(el) {
  const juz   = el.dataset.juz;
  const surah = el.dataset.surah;
  const ayat  = el.dataset.ayat;

  let bookmarks = getBookmarks();

  const idx = bookmarks.findIndex(b =>
  b.mode === 'mushaf' &&
  b.juz == juz &&
  b.surah == surah &&
  b.ayat == ayat
);

 if (idx >= 0) {
  bookmarks.splice(idx, 1);
  el.classList.remove('bookmarked');
  showToast('Bookmark dihapus');
} else {
  bookmarks.push({
  mode: 'mushaf',
  page: juz,
  juz,
  surah,
  ayat,
  text: el.textContent.replace(/﴿.*?﴾/, '').trim()
});
  el.classList.add('bookmarked');
  showToast('Berhasil ditambahkan ke bookmark');
}

  saveBookmarks(bookmarks);
}

   if (navigator.vibrate) navigator.vibrate(20);

window.addEventListener('load', () => {
  if (!localStorage.getItem('hintBookmarkShown')) {
    setTimeout(() => {
      showToast('💡 Double tap ayat untuk bookmark', 2500);
      localStorage.setItem('hintBookmarkShown', '1');
    }, 600);
  }
});


window.addEventListener('load', () => {
  const hint = document.getElementById('hintBookmark');

  // tampilkan
  hint.classList.add('show');

  // hilangkan setelah 5 detik
  setTimeout(() => {
    hint.classList.remove('show');
  }, 5000);
});

   
</script>

</body>
</html>
