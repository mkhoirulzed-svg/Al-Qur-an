<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doa Harian</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.page-doa{
  background:var(--bg);
}

.doa-container{
  padding:18px 18px 110px;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#judul-doa{
  font-size:17px;
  font-weight:800;
  color:var(--primary);
}

#subjudul-doa{
  font-size:12px;
  color:var(--text-secondary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.doa-card{
  background:var(--card);
  border-radius:20px;
  padding:18px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
}

.doa-title{
  font-size:15px;
  font-weight:800;
  color:var(--primary);
  margin-bottom:12px;
}

.doa-arab{
  direction:rtl;
  text-align:right;
  font-family:'Amiri',serif;
  font-size:26px;
  line-height:2;
  color:var(--text);
  margin-bottom:12px;
}

.doa-latin{
  font-size:14px;
  line-height:1.7;
  color:var(--text);
  margin-bottom:10px;
  font-style:italic;
}

.doa-arti{
  font-size:14px;
  line-height:1.7;
  color:var(--text-secondary);
}

.doa-sumber{
  margin-top:12px;
  font-size:12px;
  color:var(--text-secondary);
}

#daftarDoa p{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  text-align:center;
  color:var(--text-secondary);
  box-shadow:var(--shadow-sm);
}
</style>
</head>

<body class="page-doa">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div id="judul-doa">Doa Harian</div>
    <div id="subjudul-doa">Kumpulan doa pilihan</div>
  </div>
</header>

<main class="doa-container">
  <div id="daftarDoa">
    <p>Memuat doa...</p>
  </div>
</main>

<div id="footer"></div>

<script>
const daftarDoaEl = document.getElementById('daftarDoa');

async function loadDoa(){
  try{
    const res = await fetch('../data/doa.json?v=' + Date.now());
    const data = await res.json();

    daftarDoaEl.innerHTML = '';

    data.forEach(doa => {
      const card = document.createElement('div');
      card.className = 'doa-card';

      card.innerHTML = `
        <div class="doa-title">${doa.judul || ''}</div>

        ${doa.arab ? `<div class="doa-arab">${doa.arab}</div>` : ''}

        ${doa.latin ? `<div class="doa-latin">${doa.latin}</div>` : ''}

        ${doa.arti ? `<div class="doa-arti">${doa.arti}</div>` : ''}

        ${doa.sumber ? `<div class="doa-sumber">Sumber: ${doa.sumber}</div>` : ''}
      `;

      daftarDoaEl.appendChild(card);
    });

  }catch(err){
    daftarDoaEl.innerHTML = '<p>Gagal memuat doa.</p>';
    console.error(err);
  }
}

loadDoa();
</script>

<script src="../data/loader.js"></script>
<script>
  loadFooter("doa");
</script>

</body>
</html>
