<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Detail Doa</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
.page-doa-detail{
  background:var(--bg);
}

.doa-detail-container{
  padding:18px 18px 110px;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.header-title{
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#judul-doa{
  font-size:17px;
  font-weight:800;
  color:var(--primary);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

#subjudul-doa{
  font-size:12px;
  color:var(--text-secondary);
}

.doa-card{
  background:var(--card);
  border-radius:22px;
  padding:20px;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
}

.doa-arab{
  direction:rtl;
  text-align:right;
  font-family:'Amiri',serif;
  font-size:28px;
  line-height:2.1;
  color:var(--text);
  margin-bottom:18px;
}

.doa-latin{
  font-size:14px;
  line-height:1.8;
  color:var(--text);
  font-style:italic;
  margin-bottom:14px;
}

.doa-arti{
  font-size:14px;
  line-height:1.8;
  color:var(--text-secondary);
  margin-bottom:14px;
}

.doa-sumber{
  margin-top:14px;
  padding-top:12px;
  border-top:1px solid rgba(0,0,0,.08);
  font-size:12px;
  color:var(--text-secondary);
}

.info-box{
  background:var(--card);
  border-radius:18px;
  padding:16px;
  text-align:center;
  color:var(--text-secondary);
  box-shadow:var(--shadow-sm);
}
</style>
</head>

<body class="page-doa-detail">

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none"
      stroke="currentColor"
      stroke-width="2.5"
      stroke-linecap="round"
      stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <div id="judul-doa">Detail Doa</div>
    <div id="subjudul-doa">Doa Harian</div>
  </div>
</header>

<main class="doa-detail-container">
  <div id="detailDoa">
    <div class="info-box">Memuat doa...</div>
  </div>
</main>

<div id="footer"></div>

<script>
const detailDoaEl = document.getElementById('detailDoa');
const judulDoaEl = document.getElementById('judul-doa');

const params = new URLSearchParams(window.location.search);
const idDoa = params.get('id');

async function loadDetailDoa(){
  try{
    if(!idDoa){
      detailDoaEl.innerHTML = '<div class="info-box">Doa tidak ditemukan.</div>';
      return;
    }

    const res = await fetch('../data/doa.json?v=' + Date.now());

    if(!res.ok){
      throw new Error('File doa.json tidak ditemukan');
    }

    const data = await res.json();
    const doa = data.find(item => item.id === idDoa);

    if(!doa){
      detailDoaEl.innerHTML = '<div class="info-box">Doa tidak ditemukan.</div>';
      return;
    }

    document.title = doa.judul || 'Detail Doa';
    judulDoaEl.textContent = doa.judul || 'Detail Doa';

    detailDoaEl.innerHTML = `
      <div class="doa-card">
        ${doa.arab ? `<div class="doa-arab">${doa.arab}</div>` : ''}

        ${doa.latin ? `<div class="doa-latin">${doa.latin}</div>` : ''}

        ${doa.arti ? `<div class="doa-arti">${doa.arti}</div>` : ''}

        ${doa.sumber ? `<div class="doa-sumber">Sumber: ${doa.sumber}</div>` : ''}
      </div>
    `;

  }catch(err){
    detailDoaEl.innerHTML = '<div class="info-box">Gagal memuat doa.</div>';
    console.error(err);
  }
}

loadDetailDoa();
</script>

<script src="../data/loader.js"></script>
<script>
  loadFooter("doa");
</script>

</body>
</html>
