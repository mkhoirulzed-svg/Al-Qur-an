<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surah</title>

<link rel="stylesheet" href="../style.css">

<style>
/* ===== POPUP AYAT ===== */
.ayat-popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.45);
  display:flex;
  justify-content:center;
  align-items:flex-end;
  z-index:999;
}
.ayat-popup.hidden{display:none}

.popup-sheet{
  width:100%;
  max-width:480px;
  background:#111;
  color:#fff;
  border-radius:16px 16px 0 0;
  padding:16px;
  animation:slideUp .25s ease;
}
.popup-handle{
  width:40px;height:4px;
  background:#555;border-radius:2px;
  margin:0 auto 10px;
}
.popup-title{
  text-align:center;
  font-size:14px;
  opacity:.8;
  margin-bottom:12px;
}
.popup-btn{
  width:100%;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  border:none;
  background:#1a56db;
  color:#fff;
  font-size:15px;
}
.popup-close{
  background:transparent;
  color:#aaa;
  border:none;
  width:100%;
  padding:10px;
}

/* highlight ayat aktif */
.ayat-item.playing{
  background:rgba(26,86,219,.12);
  border-left:4px solid #1a56db;
}

@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}
</style>
</head>

<body>

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <span id="judul">Surah</span>
  </div>

  <button class="nav-btn translate-btn" id="toggleTerjemah">🌐</button>
</header>

<main class="container" id="ayatList">
  <p>Memuat ayat...</p>
</main>

<audio id="audioPlayer"></audio>

<!-- ===== POPUP ===== -->
<div id="ayatPopup" class="ayat-popup hidden">
  <div class="popup-sheet">
    <div class="popup-handle"></div>
    <div class="popup-title" id="popupTitle">QS - : -</div>
    <button id="popupPlay" class="popup-btn">▶ Putar Murattal</button>
    <button id="popupBookmark" class="popup-btn">⭐ Bookmark Ayat</button>
    <button id="popupClose" class="popup-close">Tutup</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const no = Number(params.get('no'));

const ayatList = document.getElementById('ayatList');
const judul = document.getElementById('judul');
const audioPlayer = document.getElementById('audioPlayer');
const toggleBtn = document.getElementById('toggleTerjemah');

const popup = document.getElementById('ayatPopup');
const popupTitle = document.getElementById('popupTitle');
const popupPlay = document.getElementById('popupPlay');
const popupBookmark = document.getElementById('popupBookmark');
const popupClose = document.getElementById('popupClose');

let selectedAyat = null;
let currentPlaying = null;

function getBookmarks(){
  return JSON.parse(localStorage.getItem('bookmarks')) || [];
}
function isBookmarkedSurah(surah, ayat){
  return getBookmarks().some(b =>
    b.mode === 'surah' && b.surah == surah && b.ayat == ayat
  );
}

/* ================= FETCH ================= */
fetch(`https://api.alquran.cloud/v1/surah/${no}/editions/ar.alafasy,id.indonesian`)
.then(res=>res.json())
.then(res=>{
  const arab=res.data[0];
  const indo=res.data[1];
  judul.textContent=`${arab.englishName} (${arab.name})`;
  ayatList.innerHTML='';

  function toArabicNumber(num){
    const d=['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
    return String(num).replace(/\d/g,x=>d[x]);
  }

  arab.ayahs.forEach(a=>{
    const terjemah=indo.ayahs.find(x=>x.numberInSurah===a.numberInSurah);
    const div=document.createElement('div');
    div.className='ayat-item';

    if(isBookmarkedSurah(arab.number,a.numberInSurah)){
      div.classList.add('bookmarked');
    }

    div.dataset.surah=arab.number;
    div.dataset.surahName=arab.englishName;
    div.dataset.ayat=a.numberInSurah;
    div.dataset.text=a.text;
    div.dataset.audio=a.audio;

    div.innerHTML=`
      <div class="ayat-content">
        <div class="ayat-arab">
          ${a.text}
          <span class="ayat-nomor-inline">﴿${toArabicNumber(a.numberInSurah)}﴾</span>
        </div>
        <div class="ayat-indo">${terjemah?.text || ''}</div>
      </div>
    `;
    ayatList.appendChild(div);
  });
});

/* ========== TOGGLE TERJEMAH ========== */
let showTerjemah=true;
toggleBtn.onclick=()=>{
  showTerjemah=!showTerjemah;
  document.body.classList.toggle('hide-translation',!showTerjemah);
};

/* ========== KLIK AYAT → POPUP ========== */
document.addEventListener('click',e=>{
  const ayat=e.target.closest('.ayat-item');
  if(!ayat) return;

  selectedAyat=ayat;
  popupTitle.textContent=
    `QS. ${ayat.dataset.surahName} : ${ayat.dataset.ayat}`;
  popup.classList.remove('hidden');
});

/* ========== POPUP ACTIONS ========== */
popupPlay.onclick=()=>{
  if(!selectedAyat) return;

  if(currentPlaying){
    currentPlaying.classList.remove('playing');
  }

  currentPlaying=selectedAyat;
  currentPlaying.classList.add('playing');

  audioPlayer.src=currentPlaying.dataset.audio;
  audioPlayer.play();
  popup.classList.add('hidden');
};

popupBookmark.onclick=()=>{
  const surah=selectedAyat.dataset.surah;
  const ayat=selectedAyat.dataset.ayat;
  let bookmarks=getBookmarks();

  const idx=bookmarks.findIndex(b=>
    b.mode==='surah' && b.surah==surah && b.ayat==ayat
  );

  if(idx>=0){
    bookmarks.splice(idx,1);
    selectedAyat.classList.remove('bookmarked');
  }else{
    bookmarks.push({
      mode:'surah',
      surah,
      surahName:selectedAyat.dataset.surahName,
      ayat,
      text:selectedAyat.dataset.text
    });
    selectedAyat.classList.add('bookmarked');
  }

  localStorage.setItem('bookmarks',JSON.stringify(bookmarks));
  popup.classList.add('hidden');
};

popupClose.onclick=()=>popup.classList.add('hidden');

/* ========== AUTO NEXT AYAT ========== */
audioPlayer.addEventListener('ended',()=>{
  if(!currentPlaying) return;

  const next=currentPlaying.nextElementSibling;
  if(next && next.classList.contains('ayat-item')){
    currentPlaying.classList.remove('playing');
    currentPlaying=next;
    currentPlaying.classList.add('playing');

    audioPlayer.src=currentPlaying.dataset.audio;
    audioPlayer.play();

    currentPlaying.scrollIntoView({
      behavior:'smooth',
      block:'center'
    });
  }else{
    currentPlaying.classList.remove('playing');
    currentPlaying=null;
  }
});
</script>

</body>
</html>
