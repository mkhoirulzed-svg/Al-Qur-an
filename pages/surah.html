<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Surah</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../style.css?v=2">

<style>
.ayat-item{
  background:var(--card);
  border-radius:20px;
  padding:18px 16px;
  margin-bottom:14px;
  box-shadow:var(--shadow-sm);
  border:1px solid rgba(255,255,255,.7);
  transition:.25s ease;
}

.ayat-item:active{
  transform:scale(.985);
}

.ayat-item.bookmarked{
  border-left:4px solid var(--accent);
  background:rgba(196,154,42,.08);
}

.ayat-item.playing{
  border-left:4px solid var(--primary);
  background:var(--primary-ghost-strong);
}

.ayat-content{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.ayat-arab{
  font-family:'Amiri',serif;
  direction:rtl;
  text-align:right;
  font-size:29px;
  line-height:2.15;
  color:var(--text);
}

.ayat-nomor-inline{
  display:inline-block;
  color:var(--primary);
  font-size:23px;
  margin-right:6px;
}

.ayat-indo{
  font-size:14px;
  line-height:1.75;
  color:var(--text-secondary);
}

.hide-translation .ayat-indo{
  display:none;
}

.bismillah{
  background:linear-gradient(145deg,#0a4d3a,#0f6e52);
  color:#fff;
  border-radius:20px;
  padding:20px 16px;
  margin-bottom:16px;
  text-align:center;
  direction:rtl;
  font-size:27px;
  box-shadow:0 8px 28px rgba(10,77,58,.2);
}

.bismillah-deco{
  color:var(--accent);
  font-size:18px;
  margin:0 8px;
}

.nav-btn{
  width:42px;
  height:42px;
  border:none;
  border-radius:14px;
  background:var(--card);
  color:var(--primary);
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:var(--shadow-sm);
}

.translate-btn{
  margin-left:auto;
  font-size:18px;
}

.header-title{
  flex:1;
  font-size:16px;
  font-weight:800;
  color:var(--primary);
  line-height:1.25;
}

/* ===== POPUP AYAT ===== */
.ayat-popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.42);
  display:flex;
  justify-content:center;
  align-items:flex-end;
  z-index:999;
  backdrop-filter:blur(4px);
  -webkit-backdrop-filter:blur(4px);
}

.ayat-popup.hidden{
  display:none;
}

.popup-sheet{
  width:100%;
  max-width:480px;
  background:var(--card);
  color:var(--text);
  border-radius:24px 24px 0 0;
  padding:16px 18px 22px;
  box-shadow:0 -8px 40px rgba(0,0,0,.18);
  animation:slideUp .25s ease;
}

.popup-handle{
  width:42px;
  height:4px;
  background:var(--border);
  border-radius:999px;
  margin:0 auto 12px;
}

.popup-title{
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:var(--text-secondary);
  margin-bottom:14px;
}

.popup-btn{
  width:100%;
  padding:13px;
  margin-bottom:10px;
  border-radius:14px;
  border:none;
  background:var(--primary);
  color:#fff;
  font-size:15px;
  font-weight:700;
}

#popupBookmark{
  background:var(--accent);
}

.popup-close{
  background:transparent;
  color:var(--text-muted);
  border:none;
  width:100%;
  padding:11px;
  font-size:14px;
  font-weight:700;
}

@keyframes slideUp{
  from{transform:translateY(100%)}
  to{transform:translateY(0)}
}
</style>
</head>

<body>

<header class="app-header">
  <button class="nav-btn back-btn" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="22" height="22"
      fill="none" stroke="currentColor"
      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <div class="header-title">
    <span id="judul">Surah</span>
  </div>

  <button class="nav-btn translate-btn" id="toggleTerjemah">🌐</button>
</header>

<main class="container" id="ayatList">
  <p>Memuat ayat...</p>
</main>

<audio id="audioPlayer"></audio>

<!-- ===== POPUP ===== -->
<div id="ayatPopup" class="ayat-popup hidden">
  <div class="popup-sheet">
    <div class="popup-handle"></div>
    <div class="popup-title" id="popupTitle">QS - : -</div>
    <button id="popupPlay" class="popup-btn">▶ Putar Murattal</button>
    <button id="popupBookmark" class="popup-btn">⭐ Bookmark Ayat</button>
    <button id="popupClose" class="popup-close">Tutup</button>
  </div>
</div>

<script src="../data/surah-names.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const no = Number(params.get('no'));

const ayatList = document.getElementById('ayatList');
const judul = document.getElementById('judul');
const audioPlayer = document.getElementById('audioPlayer');
const toggleBtn = document.getElementById('toggleTerjemah');

const popup = document.getElementById('ayatPopup');
const popupTitle = document.getElementById('popupTitle');
const popupPlay = document.getElementById('popupPlay');
const popupBookmark = document.getElementById('popupBookmark');
const popupClose = document.getElementById('popupClose');

let selectedAyat = null;
let currentPlaying = null;

/* ================= BOOKMARK ================= */
function getBookmarks(){
  return JSON.parse(localStorage.getItem('bookmarks')) || [];
}
function isBookmarkedSurah(surah, ayat){
  return getBookmarks().some(b =>
    b.mode==='surah' && b.surah==surah && b.ayat==ayat
  );
}

/* ================= FETCH ================= */
fetch(`https://api.alquran.cloud/v1/surah/${no}/editions/ar.alafasy,id.indonesian`)
.then(res=>res.json())
.then(res=>{
  const arab=res.data[0];
  const indo=res.data[1];
const surahLatin = SURAH_NAMES[arab.number] || arab.englishName;
judul.textContent = `${surahLatin} (${arab.name})`;
  ayatList.innerHTML='';

  function removeBismillah(text) {
  if (!text.includes('بِسْمِ') && !text.includes('بسم')) {
    return text.trim();
  }

  const rahimWords = ['الرَّحِيمِ', 'ٱلرَّحِيمِ'];

  for (const word of rahimWords) {
    const idx = text.indexOf(word);
    if (idx !== -1) {
      return text.slice(idx + word.length).trim();
    }
  }

  return text.trim();
}

  function toArabicNumber(num){
    const d=['٠','١','٢','٣','٤','٥','٦','٧','٨','٩'];
    return String(num).replace(/\d/g,x=>d[x]);
  }

  /* ===== BISMILLAH HEADER (TIDAK MENYATU) ===== */
  if(arab.number !== 1 && arab.number !== 9){
    const bismillah=document.createElement('div');
    bismillah.className='bismillah ayat-arab';
    bismillah.innerHTML=`
      <span class="bismillah-deco">❁</span>
      بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
      <span class="bismillah-deco">❁</span>
    `;
    ayatList.appendChild(bismillah);
  }

  arab.ayahs.forEach(a=>{
    let ayatText=a.text;

    /* ===== HILANGKAN BISMILLAH DARI AYAT 1 (VISUAL) ===== */
    if(
      a.numberInSurah===1 &&
      arab.number !== 1 &&
      arab.number !== 9
    ){
      ayatText = removeBismillah(ayatText);
    }

    const terjemah=indo.ayahs.find(x=>x.numberInSurah===a.numberInSurah);
    const div=document.createElement('div');
    div.className='ayat-item';
div.id = `ayat-${a.numberInSurah}`;

    if(isBookmarkedSurah(arab.number,a.numberInSurah)){
      div.classList.add('bookmarked');
    }

    div.dataset.surah=arab.number;
   div.dataset.surahName = surahLatin;
    div.dataset.ayat=a.numberInSurah;
    div.dataset.text=a.text;
    div.dataset.audio=a.audio;

    div.innerHTML=`
      <div class="ayat-content">
        <div class="ayat-arab">
          ${ayatText}
          <span class="ayat-nomor-inline">﴿${toArabicNumber(a.numberInSurah)}﴾</span>
        </div>
        <div class="ayat-indo">${terjemah?.text || ''}</div>
      </div>
    `;
    ayatList.appendChild(div);
  });
    const targetAyat = localStorage.getItem('scrollToAyat');

  if (targetAyat) {
    setTimeout(() => {
      const target = document.getElementById(`ayat-${targetAyat}`);

      if (target) {
        target.scrollIntoView({
          behavior: 'smooth',
          block: 'center'
        });

        target.classList.add('playing');

        setTimeout(() => {
          target.classList.remove('playing');
        }, 1800);
      }

      localStorage.removeItem('scrollToAyat');
    }, 400);
  }
});

/* ================= TOGGLE TERJEMAH ================= */
let showTerjemah=true;
toggleBtn.onclick=()=>{
  showTerjemah=!showTerjemah;
  document.body.classList.toggle('hide-translation',!showTerjemah);
};

/* ================= KLIK AYAT → POPUP ================= */
document.addEventListener('click',e=>{
  const ayat=e.target.closest('.ayat-item');
  if(!ayat) return;

  selectedAyat=ayat;
  popupTitle.textContent=
    `QS. ${ayat.dataset.surahName} : ${ayat.dataset.ayat}`;
  popup.classList.remove('hidden');
});

/* ================= POPUP ACTIONS ================= */
popupPlay.onclick=()=>{
  if(!selectedAyat) return;

  if(currentPlaying){
    currentPlaying.classList.remove('playing');
  }

  currentPlaying=selectedAyat;
  currentPlaying.classList.add('playing');

  audioPlayer.src=currentPlaying.dataset.audio;
  audioPlayer.play();
  popup.classList.add('hidden');
};

popupBookmark.onclick=()=>{
  const surah=selectedAyat.dataset.surah;
  const ayat=selectedAyat.dataset.ayat;
  let bookmarks=getBookmarks();

  const idx=bookmarks.findIndex(b=>
    b.mode==='surah' && b.surah==surah && b.ayat==ayat
  );

  if(idx>=0){
    bookmarks.splice(idx,1);
    selectedAyat.classList.remove('bookmarked');
  }else{
    bookmarks.push({
      mode:'surah',
      surah,
      surahName:selectedAyat.dataset.surahName,
      ayat,
      text:selectedAyat.dataset.text
    });
    selectedAyat.classList.add('bookmarked');
  }

  localStorage.setItem('bookmarks',JSON.stringify(bookmarks));
  popup.classList.add('hidden');
};

popupClose.onclick=()=>popup.classList.add('hidden');

/* ================= AUTO NEXT AYAT ================= */
audioPlayer.addEventListener('ended',()=>{
  if(!currentPlaying) return;

  const next=currentPlaying.nextElementSibling;
  if(next && next.classList.contains('ayat-item')){
    currentPlaying.classList.remove('playing');
    currentPlaying=next;
    currentPlaying.classList.add('playing');

    audioPlayer.src=currentPlaying.dataset.audio;
    audioPlayer.play();

    currentPlaying.scrollIntoView({
      behavior:'smooth',
      block:'center'
    });
  }else{
    currentPlaying.classList.remove('playing');
    currentPlaying=null;
  }
});
</script>

</body>
</html>
